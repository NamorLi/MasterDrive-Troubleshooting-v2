<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>מדריך תקלות Siemens SIMOVERT MASTERDRIVES</title>
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --ok:#22c55e;
    --err:#ef4444; --warn:#f59e0b; --text:#e2e8f0; --muted:#94a3b8;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, "Segoe UI", Arial, sans-serif;
         background: var(--bg); color: var(--text); min-height:100vh; }
  header { padding: 20px; text-align:center; border-bottom: 1px solid #334155; }
  h1 { margin: 0; font-size: 24px; color: var(--accent); }
  .sub { color: var(--muted); font-size: 13px; margin-top:4px; }
  main { max-width: 900px; margin: 0 auto; padding: 20px; }
  .mic-area { text-align:center; padding: 30px 10px; }
  #micBtn {
    width: 160px; height: 160px; border-radius: 50%;
    background: var(--accent); color: #0f172a; border:none;
    font-size: 20px; font-weight: bold; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 0 0 0 rgba(56,189,248,0.6);
  }
  #micBtn:hover { transform: scale(1.05); }
  #micBtn.listening { background: var(--err); color:white;
    animation: pulse 1.2s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
    70% { box-shadow: 0 0 0 30px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
  }
  .heard { margin-top: 16px; color: var(--muted); font-size: 14px; min-height: 20px; }
  .manual {
    margin-top: 12px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
  }
  .manual input {
    padding: 10px 14px; font-size: 16px; border-radius: 8px;
    border: 1px solid #334155; background: var(--panel); color: var(--text);
    width: 160px; text-align:center; text-transform: uppercase;
  }
  .manual button {
    padding: 10px 18px; background: var(--panel); color: var(--text);
    border: 1px solid #334155; border-radius: 8px; cursor: pointer; font-size:15px;
  }
  .manual button:hover { background: #334155; }
  .card { background: var(--panel); border-radius: 12px; padding: 20px;
          margin-top: 20px; border-right: 4px solid var(--accent); }
  .card.error { border-color: var(--err); }
  .code-row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .code-badge {
    font-size: 28px; font-weight: bold; color: var(--accent);
    background: #0b1220; padding: 6px 14px; border-radius: 8px;
    font-family: monospace; direction:ltr;
  }
  .code-name { font-size: 20px; font-weight: 600; }
  .section { margin-top: 16px; }
  .section h3 { margin: 0 0 8px; color: var(--accent); font-size: 16px; }
  .section.measure h3 { color: var(--ok); }
  .section pre {
    background: #0b1220; padding: 14px; border-radius: 8px;
    white-space: pre-wrap; font-family: inherit; font-size: 15px;
    line-height: 1.55; margin: 0; direction: ltr; text-align: left;
  }
  .status { text-align:center; color: var(--muted); font-size:13px; margin-top:8px; }
  .err-msg { color: var(--err); }
  .footer { text-align:center; color: var(--muted); font-size:12px; padding:20px; }
  .suggest { margin-top:10px; font-size:14px; }
  .suggest span { display:inline-block; padding:4px 8px; margin:2px;
    background:#334155; border-radius:6px; cursor:pointer; direction:ltr; font-family:monospace;}
</style>
</head>
<body>
<header>
  <h1>מדריך תקלות SIMOVERT MASTERDRIVES</h1>
  <div class="sub">אמור בקול את קוד התקלה (לדוגמה: "F zero zero one" או "F six") • <span id="codeCount"></span> קודים זמינים</div>
</header>

<main>
  <div class="mic-area">
    <button id="micBtn">🎤<br>לחץ ודבר</button>
    <div class="heard" id="heard"></div>
    <div class="manual">
      <input id="manualInput" placeholder="F001" maxlength="5">
      <button id="manualBtn">חפש</button>
    </div>
    <div class="status" id="status"></div>
  </div>
  <div id="result"></div>
</main>

<div class="footer">
  מבוסס על: Siemens SIMOVERT MASTERDRIVES Vector Control – Operating Instructions (6SE7087-6JK60)
</div>

<script>
// נתוני התקלות משובצים ישירות בקובץ, כך שהאפליקציה עובדת מכל תיקיה
// בלחיצה כפולה על הקובץ ללא צורך בשרת.
const FAULTS = {"F001": {"code": "F001", "name": "Main contactor checkback", "cause": "If a main contactor checkback is configured,\nno checkback occurs within the time set in\nP600 after the power-up command. In the\ncase of externally excited synchronous motors\n(P095 = 12), there is no checkback for the\nexcitation current unit.", "measure": "P591 Src Contactor Msg\nParameter value must be in conformance with\nthe connection of the main contactor\ncheckback.\nCheck the checkback loop of the main\ncontactor (or the checkback of the excitation\ncurrent unit in the case of synchronous\nmotors)."}, "F002": {"code": "F002", "name": "Pre-charging", "cause": "When pre-charging, the minimum DC link\nvoltage (P071 Line Volts x 1.34) of 80 % has\nnot been reached.\nThe maximum pre-charging time of 3 seconds\nhas been exceeded.", "measure": "Check the supply voltage,\nCompare witth P071 Line Volts (Compare\nP071 with the DC link voltage on DC units).\nCheck the rectifier/regenerative unit on DC\nunits. The rectifier/regenerative unit must be\nswitched on before the inverter is switched on."}, "F006": {"code": "F006", "name": "DC link overvoltage", "cause": "Shutdown has occurred due to excessive DC\nlink voltage.\nLine voltage I DC voltage range I Shutdown\nvalue\n-------------------------------------------------------------\n200 V - 230 V I 270 V - 310 V I appr. 410 V\n380 V - 480 V I 510 V - 650 V I appr. 820 V\n500 V - 600 V I 675 V - 810 V I appr. 1020 V\n660 V - 690 V I 890 V - 930 V I appr. 1220 V\nFor parallel-connected converters (BF M,N)\nr949 = 1: Overvoltage in the DC link of the\nmaster\nr949 = 2: Overvoltage in the DC link of the\nslave.", "measure": "Check the supply voltage or input DC voltage.\nConverter is operating in regenerative mode\nwithout feedback possibility.\nIf the converter supply voltage is at the upper\ntolerance limit and it is operating at full load,\nF006 can also be caused by a line phase\nfailure.\nPossibly\n- Increaase P464 Decel Time,\n- Activate P515 DC Bus Volts Reg (check\nP071 beforehand)\n- Reduce P526 Fly Search Speed.\n- Reduce P259 Max Regen Power (only for\nP100 = 3, 4 or 5)"}, "F008": {"code": "F008", "name": "DC link undervoltage", "cause": "The lower limit value of 76 % of the DC link\nvoltage (P071 Line Volts), or of 61 % when\nkinetic buffering has been enabled, has been\nfallen short of.\nUndervoltage in the DC link in 'normal'\noperation (i.e. no SIMULATION).\nUndervoltage in the DC link with active kinetic\nbuffering and speed less than 10 % of the\nrated motor speed.\nIt was a 'brief power failure' which was not\ndetected until system recovery (auto restart\nflag).", "measure": "Check\n- Input DC voltage\n- DC link"}, "F010": {"code": "F010", "name": "DC link overvoltage", "cause": "Due to excessive DC link voltage, shutdown\nhas taken place:\nLine voltage DC link range Shutdown\nvalue\n380 V - 480 V 510 V - 650 V 740 V\nNote:\nOnly at U800 = 1 and f(Pulse) > f(derating)\nLower threshold value than F006 !", "measure": "Check the supply voltage\nCheck the braking resistor\nConverter operates regeneratively without a\nfeedback possibility. Braking unit must be set\nto the lower response threshold (673 V)"}, "F011": {"code": "F011", "name": "Overcurrent", "cause": "Overcurrent shutdown has occurred.\nThe shutdown threshold has been exceeded.", "measure": "- Check the converter output for short-circuit or\nearth fault\n- Check the load for an overload condition\n- Check whether motor and converter are\ncorrectly matched\n- Check whether the dynamic requirements\nare too high"}, "F012": {"code": "F012", "name": "I too low", "cause": "During excitation of the induction motor, the\ncurrent did not rise above 12.5 % of the\nsetpoint magnetizing current for no-load\noperation.", "measure": "Only for closed loop n/f/T control (P100 = 3, 4\nor 5)\nIf no motor is connected, go into the simulation\nmode P372.\nCheck current detection, check power section."}, "F014": {"code": "F014", "name": "I too low 14-2", "cause": "During excitation of the motor, the current\ncomponent is less than 25 % of the motor no-\nload current.\nNote:\nOnly for U800 = 1\nIrrespective of the type of control\n(Difference to F012)\nOperating", "measure": "Check the output contactor\nCheck the motor cable\nSiemens AG\nInstructions SIMOVERT MASTERDRIVES"}, "F015": {"code": "F015", "name": "Motor stall", "cause": "Motor has stalled or is locked:\n- if the static load is too high\n- if the acceleration or deceleration time is too\nfast, or if load change is too fast and too great,\n- Inc\n- due to incorrect parameterization of the pulse\nencoder pulse number P151 or of the analog - Inc\ntachometer scaling P138 set/a\n- due to disturbed speed signals (tachometer\nshield not connected)\nThe fault is only generated after the time set in\nP805.\nThe binector B0156 is set in the status word 2\nr553 Bit 28.\nTo detect whether the drive is blocked, see\nP792 (Perm Deviation) and P794. With n/f\ncontrol, this fault is tripped if the torque limits\nhave been reached (B0234).\nWith speed control (P100 = 4) and master\ndrive (see P587), the fault can also point to an\ninterruption in the encoder cable. This case\nhas the same significance as if the drive is\nlocked.\nWith v/f control, the I(max) controller has to be\nactivated (P331). The monitor does not\noperate with v/f textile applications (P100 = 2).\nMotor has stalled or is locked:\nIn the case of synchronous motors (P095 =\n12, 13): by reaching the maximum frequency\nIn the case of externally excited synchronous\nmotors (P095 = 12): as a result of missing or\nexcessively high excitation current (flux is too\nsmall or too great).\nWhen the maximum frequency (including\ncontrol reserves) (B0254) has been reached\non synchronous motors, the fault is generated\nimmediately. If the deviations in the rotor flux\nare too great, first of all, the converter current\nis switched to zero, the excitation current is\nreduced and, after some time, the fault\nmessage is tripped at the level of the double\ndamping time constant (2*r124.1). During this\nwait time, the status word bit B0156 (r553.28)\nis set already.", "measure": "- Reduce load\n- Release brake\n- Increase current limits\nrease P805 PullOut/BlckTime\nrease P792 response threshold for\nctual deviation\nOnly for f/n/T control (P100 = 3, 4, 5)\n- Increase torque limits or torque setpoint\nOnly n/T control or v/f control with speed\ncontroller: (P100 = 0, 4, 5)\n- Check tachometer cable break\n- Check pulse encoder pulse number\n- Check analog tachometer scaling\n- Connect shield of tachometer cable on motor\nside and converter side\n- Reduce smoothing of speed pre-control P216\n(only n/T control)\nonly frequency control:(P100 = 3)\n- Slow down acceleration time (see also P467\nProtRampGen Gain)\n- Increase current in the lower frequency range\n(P278, P279, P280)\n- Switch in speed controller pre-control\n(P471>0)\n- Set EMF controller more dynamically (315) to\nmax. approx. 2\n- Increase changeover frequency for the EMF\nmodel (P313)\n- Replace by speed control with pulse encoder\nin the case of overmodulated n/f controller\n- Track speed setpoint with the speed actual\nvalue so that the set/actual deviation is always\nless than that set in P792.\nOnly for synchronous motor: (P095 = 12)\n- Check current limits of the excitation unit.\n- Check excitation current setpoint and actual\nvalue (incl. wiring)\n- Check voltage limits of the excitation unit\nduring dynamic current changes.\n- Check drive system for resonance\noscillations."}, "F018": {"code": "F018", "name": "F set fly", "cause": "The found set frequency could not be\nimplemented. Reasons:\n- Additional setpoint 2 too high\n- Speed actual-value at standstill negative\n(signal ripple) and negative direction of\nrotation locked.", "measure": "- Check additional setpoint 2\n- Release negative directions of rotation with\nlow maximum speed."}, "F019": {"code": "F019", "name": "Motor not found", "cause": "During flying restart without tachometer:\nSearch in both directions of rotation not\npossible (one direction blocked) and motor has\nnot been found.", "measure": "Power up after coasting.\nPossibly increase P525 Fly Search Amps.\nEnable both directions of rotation (P571,\nP572)"}, "F020": {"code": "F020", "name": "Motor temperature", "cause": "The motor temperature limit value has been\nexceeded.\nr949 = 1 limit value of motor temperature\nexceeded\nr949 = 2 short-circuit in the cable to the motor\ntemperature sensor or sensor defective\nr949 = 4 wire break in the cable to the motor\ntemperature sensor or sensor defective\nr949 = 5 wire break and limit value exceeded", "measure": "Check the motor (load, ventilation, etc.). The\ncurrent motor temperature can be read in r009\nMotor Temperature.\nCheck P381 Mot Tmp\nFault - check the KTY84 input at connector\n-X103:29,30, or X104:29,30 (Compact PLUS)\nfor short-circuit."}, "F021": {"code": "F021", "name": "Motor I2t", "cause": "", "measure": "Parameterized limit value of the I2t monitoring Check: P383 Mot Tmp T1\nfor the motor has been exceeded."}, "F023": {"code": "F023", "name": "Inverter temperature", "cause": "", "measure": "The limit value of the inverter temperature has - Measure the air intake and ambient\nbeen exceeded. temperature\n(Observe minimum and maximum ambient\nAlarm: (r949): temperature!)\nBit0 Inverter overtemperature\n- Observe the derating curves at theta >45°C\nBit1 Wire break of cable to (Compact PLUS type) or 40°C.\ntemperature sensor\n- On Compact PLUS units: ≥ 22 kW\nBit4 Number of the temperature sensor acknowledgement is only possible after\nBit5 1 minute\nBit6\nCheck:\nBit8 Multiparallel circuit: Slave number\nBit9 - whether the fan -E1 is connected and is\nBit10 rotating in the correct direction\nExamples: - that the air entry and discharge openings are\nr949 = 1: Limit value of inverter temperature not restricted\nhas been exceeded.\n- temperature sensor at -X30\nr949 = 2: Sensor 1: wire break of sensor cable\nor sensor defective\nr949 = 18: Sensor 2: wire break of sensor\ncable or sensor defective\nr949 = 34: Sensor 3: wire break of sensor\ncable or sensor defective\nr949 = 50: Sensor 4: wire break of sensor\ncable or sensor defective."}, "F025": {"code": "F025", "name": "UCE upper switch/ UCE Ph. L1 14-4", "cause": "UCE upper switch (Compact PLUS) / or UCE\nhas tripped in phase L1\nOperating I", "measure": "Check:\n- phase L1 for short-circuit or ground fault\n(-X2:U2 - including motor)\n- that CU is correctly inserted\n- that the switch for \"SAFE STOP\" (X9/5-6) is\nopen (only for units with order No. ...-11,\n...-21,...-31, ...-61).\nSiemens AG\nnstructions SIMOVERT MASTERDRIVES"}, "F026": {"code": "F026", "name": "UCE lower switch / UCE Ph. L2", "cause": "UCE lower switch (Compact PLUS) / or UCE\nhas tripped in phase L2", "measure": "Check:\n- phase L2 for short-circuit or ground fault\n(-X2:V2 - including motor)\n- that CU is correctly inserted\n- that the switch for 'SAFE STOP' (X9/5-6) is\nopen (only for units with order Nos....-11,\n...-21,...-31, ...-61)"}, "F027": {"code": "F027", "name": "Fault pulse resistor / UCE Ph. L3", "cause": "Fault pulse resistor (Compact PLUS) / or UCE\nhas tripped in phase L3", "measure": "Check:\n- phase L3 for short-circuit or ground fault\n(-X2:W2 - including motor)\n- that CU is correctly inserted\n- that the switch for 'SAFE STOP' (X9/5-6) is\nopen (only for units with order Nos....-11,\n...-21,...-31, ...-61)"}, "F028": {"code": "F028", "name": "Supply phase", "cause": "The frequency and the amplitude of the DC\nlink ripple indicate a single-phase power\nfailure.", "measure": "Check the supply voltage."}, "F029": {"code": "F029", "name": "Meas. value sensing", "cause": "A fault has occurred in the measured value\nsensing system:\nThe measured variable at which a fault\noccurred during offset adjustment is bit-coded\nand stored in r949 :\nBit 0: Current phase L1\nBit 1: Current phase L2\nBit 2: DC link voltage\nBit 3: Inverter temperature\nBit 4: Motor temperature\nBit 5: Analog input 1\nBit 6: Analog input 2\nExamples:\n- (r949 = 1) Offset adjustment in phase L1 not\npossible\n- (r949 = 2) Offset adjustment in phase L3 not\npossible.\n- (r949 = 3) Offset adjustment in phases L1\nand L3 not possible.", "measure": "Causes in phase L1 and L2:\n- Fault in measured value sensing system\n- Fault in power section (valve cannot block)\n- Fault on CU\nCauses on all other measured variables:\n- Fault on CU (SIMA) -> replace CU"}, "F035": {"code": "F035", "name": "Ext. Fault 1", "cause": "Parameterizable external fault input 1 has\nbeen activated", "measure": "Check:\n- whether there is an external fault\n- whether the cable to the appropriate digital\ninput has been interrupted\n- P575 Src No ExtFault1"}, "F036": {"code": "F036", "name": "Ext. Fault 2", "cause": "Parameterizable external fault input 2 has\nbeen activated", "measure": "Check:\n- whether there is an external fault\n- whether the cable to the appropriate digital\ninput has been interrupted\n- P585 Src No ExtFault2"}, "F037": {"code": "F037", "name": "Analog input", "cause": "An analog input is taking place in operating\nmode 4..20 mA and a wire break has\noccurred. The number of the analog input\nconcerned is shown in fault value (r949).", "measure": "Check the connection to\n- Analog input 1 -X102:15, 16,\nor -X101:9,10 (Compact PLUS).\n- Analog input 2 -X102: 17, 18.\nCheck parameters\n- P632 CU AnaIn Conf\n- P634 CU AnaIn Smooth\n- P631 CU AnaIn Offset"}, "F038": {"code": "F038", "name": "Voltage OFF during parameter storage", "cause": "During a parameter task, a voltage failure has\noccurred on the board.", "measure": "Re-enter the parameter. The number of the\nparameter concerned can be seen in fault\nvalue r949."}, "F040": {"code": "F040", "name": "AS internal", "cause": "Incorrect operating status", "measure": "Replace CU (-A10), or replace the unit\n(Compact PLUS type)"}, "F041": {"code": "F041", "name": "EEPROM fault", "cause": "", "measure": "A fault has occurred when storing the values in Replace CU (-A10), or replace the unit\nthe EEPROM. (Compact PLUS)"}, "F042": {"code": "F042", "name": "Calculating time", "cause": "Calculating time problems\nAt least 10 failures of time slots T2, T3, T4 or\nT5 (see also parameters r829.2 to r829.5)", "measure": "Reduce the calculating time load:\n- Increase P357 Sampling Time\n- Calculate individual blocks in a slower\nsampling time\nObserve r829 CalcTimeHdroom."}, "F044": {"code": "F044", "name": "BICO manager fault", "cause": "A fault has occurred during the softwiring of\nbinectors and connectors.\n- Volta\n- Facto\n- Repla", "measure": "Fault value r949:\n>1000 : Fault during softwiring of connectors\n>2000 : Fault during softwiring of binectors\nge OFF and ON\nry setting and new parameterization\nce the board"}, "F045": {"code": "F045", "name": "Opt. Board HW", "cause": "", "measure": "A hardware fault has occurred when accessing - Replace CU (-A10), or replace the unit\nan option board (Compact PLUS)\n- Check connection of the board subrack to the\noption boards and replace if necessary."}, "F046": {"code": "F046", "name": "Par. Task", "cause": "A fault has occurred during the transfer of\nparameters to the gating unit processor.", "measure": "Power the unit down and up again.\nReplace CU (-A10), or replace the unit\n(Compact PLUS type)"}, "F047": {"code": "F047", "name": "Gating Calc Time", "cause": "The calculating time in the gating unit\ncomputer is not sufficient", "measure": "Replace CU (-A10), or replace the unit\n(Compact PLUS)\nIn case of synchronous motors (P095 = 12):\nPulse frequency set too high (P340>2kHz)."}, "F048": {"code": "F048", "name": "Gating Pulse Freq", "cause": "The pulse frequency set in P340 is not\npermissible.", "measure": "Change P340 Pulse Frequency."}, "F049": {"code": "F049", "name": "SW version", "cause": "The firmware versions on the CU have\ndifferent firmware release.", "measure": "Use uniform firmware"}, "F050": {"code": "F050", "name": "TSY Init. 14-6", "cause": "Error when initializing the TSY board\nOperating", "measure": "Check:\n- Whether the TSY is correctly inserted\nSiemens AG\nInstructions SIMOVERT MASTERDRIVES"}, "F051": {"code": "F051", "name": "Speed encoder", "cause": "Digital tachometer or analog tachometer\nsensing are faulty", "measure": "Check the parameters:\n- P130 Src SpdActV\n- P151 Pulse #\n- P138 AnalogTachScale\n- P109 Motor #PolePairs\nThe product of P109 and P138 must be\nsmaller than 19200. Check or replace\ntachometer. Check connection to tachometer.\n- Replace CU (-A10), or replace the unit\n(Compact PLUS type)"}, "F052": {"code": "F052", "name": "n-Cntr.Input", "cause": "Control track input (-X103/27, or -X104/27\nCompact PLUS) is not high:\n- Tachometer line broken\n- Tachometer fault\nThe fault input on the TSY was activated.", "measure": "Unselect tachometer with control track (P130\nselect motor encoder)\nCheck control track connection (-X103/27, or\nX104/27 Compact PLUS)\nExchange TSY"}, "F053": {"code": "F053", "name": "Tachometer dn/dt", "cause": "The permissible change value of the speed\nencoder signal P215 dn(act,perm) has been\ndoubly exceeded.", "measure": "Check tachometer cables for interruptions.\nCheck earthing of tachometer shield.\n- The shield must be connected both at the\nmotor and the converter side.\n- The encoder cable must not be interrupted.\n- The encoder cable must not be laid together\nwith the power cables.\n- Only recommended encoders should be\nused.\n- In the case of a signal fault, the DT1 board\nmay have to be used. If necessary, change\nP215\n- With P806\n(observe parameter description) it is possible\nduring operation to switch over to encoder-free\noperation."}, "F054": {"code": "F054", "name": "Sensor board initialization fault", "cause": "", "measure": "A fault has occurred during initialization of the Fault value r949\nencoder board.\n1. Board code incorrect\n2. TSY not compatible\n3. SBP not compatible\n7. Board double\n20: TSY board double\n60: Internal error"}, "F056": {"code": "F056", "name": "SIMOLINK telegram failure", "cause": "Communication on the SIMOLINK ring is\ndisturbed.", "measure": "- Check the fiber-optic cable ring\n- Check whether an SLB in the ring is without\nvoltage\n- Check whether an SLB in the ring is faulty\n- Check P741 (SLB TlgOFF)"}, "F057": {"code": "F057", "name": "Brake does not open", "cause": "The brake has not opened, the output current\nof the converter has exceeded the\nparameterized current threshold (U840) for\nlonger than one second (with the rotor locked)\nNote:\nOnly with U800 = 1", "measure": "Check brake\nCheck I(max) brake (U840). The set threshold\nmust be at least 10% above the maximum\npossible acceleration current."}, "F058": {"code": "F058", "name": "Parameter fault Parameter task", "cause": "", "measure": "A fault has occurred during the processing of a No remedy\nparameter task."}, "F059": {"code": "F059", "name": "Parameter fault after factory setting/init.", "cause": "", "measure": "A fault has occurred in the initialization phase The number of the inconsistent parameter is\nduring the calculation of a parameter. indicated in fault value r949. Correct this\nparameter (ALL indices) and switch voltage off\nand on again. Several parameters may be\naffected, i.e. repeat process."}, "F060": {"code": "F060", "name": "MLFB is missing", "cause": "This is set if the MLFB = 0 after exiting\nINITIALIZATION (0.0 kW). MLFB = order\nnumber.", "measure": "After acknowledgement, in INITIALIZATION\nenter a suitable MLFB in parameter P070\nMLFB (6SE70..). (Only possible with the\ncorresponding access stages to both access\nparameters)."}, "F061": {"code": "F061", "name": "Incorrect parameterization 14-8", "cause": "A parameter entered during drive setting (e.g.\nP107 Mot Rtd Freq, P108 Mot Rtd Speed,\nP340 Pulse Frequency) is not in a permissible\nrange (depending on control type)\nOperating", "measure": "Acknowledge the fault and change the\ncorresponding parameter value. The missing\nparameter is indicated in r949 as a fault value.\nSiemens AG\nInstructions SIMOVERT MASTERDRIVES"}, "F062": {"code": "F062", "name": "Multi-parallel circuit", "cause": "", "measure": "Fault in connection with the multi-parallel r949 = 10:\ncircuit or board ImP1 has been detected. Communications card does not reply. When\nwriting the control word, BUSY is not active if\nCSOUT is inactive. Communications card is\nprobably not inserted.\nR949 = 11,12:\nTimeout during BUSY during initialization.\nBUSY does not become active within 1 sec.\nR949 = 15:\nTimeout during BUSY during normal\ncommunication. BUSY does not become\nactive within 1 sec.\nR949 = 18:\nTimeout when reading out the fault information\nfrom the ImPIs. Within one second after\nactivation of FAULT no fault cause can be\nsupplied by the IMP1.\nR949 = 20+i:\nHW conflict. This is set if bit HWCONF is set in\nstatus word of slave i. (Fault in the\nconfiguration of the multi-parallel circuit)\nr949 = 30+i:\nHW version of ImPI isnot compatible. The\nrelevant slave number is contained in i.\nR949 = 40:\nNumber of slaves does not tally with the\nsetpoint number of slaves of the unit.\nR949 = 50+i\nInconsistency in the number of slaves. The\nnumber of slaves notified by the ImPI is not in\nconformance with the number of status words\nor with the setpoint number of slaves of the\nMLFB.\nCounter-measure:\n- Check ImPI or communications card and\nreplace, if necessary.\n- Check configuration of multi-parallel circuit.\n- Check parameterization.\n- Replace CU.\n- Replace ImPI."}, "F065": {"code": "F065", "name": "Scom Telegram", "cause": "No telegram was received at an Scom\ninterface (Scom/USS protocol) within the\ntelegram failure time.", "measure": "Fault value r949:\n1 = interface 1 (SCom1)\n2 = interface 2 (SCom2)\n- Check the connection CU -X100:1 to 5 and\ncheck the connection PMU -X300.\n- Check the connection CU -X103, or\nX100/ 35,36 (Compact PLUS type)\n- Check \"SCom/SCB TLG OFF\" P704.01\n(SCom1) and P704.02 (SCom2)\n- Replace CU (-A10), or replace the unit\n(Compact PLUS type)"}, "F070": {"code": "F070", "name": "SCB initialization fault", "cause": "", "measure": "A fault has occurred during initialization of the Fault value r949:\nSCB board.\n1: Board code incorrect\n2: SCB board not compatible\n5: Error in configuration data\n(Check parameterization)\n6: Initialization timeout\n7: SCB board double\n10: Channel error"}, "F072": {"code": "F072", "name": "EB initialization fault", "cause": "", "measure": "A fault has occurred during initialization of the Fault value r949:\nEB board. 2: 1st EB1 not compatible\n3: 2nd EB1 not compatible\n4: 1st EB2 not compatible\n5: 2nd EB2 not compatible\n21: Three EB1 boards\n22: Three EB2 boards\n110: Fault on 1st EB1 (Analog input)\n120: Fault on 2nd EB1 (Analog input)\n210: Fault on 1st EB2 (Analog input)\n220: Fault on 2nd EB2 (Analog input)"}, "F073": {"code": "F073", "name": "AnInp1SL1", "cause": "4 mA at analog input 1, slave 1 fallen short of", "measure": "Check the connection of the signal source to\nthe SCI1 (slave 1) -X428: 4, 5."}, "F074": {"code": "F074", "name": "AnInp2 SL1", "cause": "4 mA at analog input 2, slave 1 fallen short of", "measure": "Check the connection of the signal source to\nthe SCI1 (slave 1) -X428: 7, 8."}, "F075": {"code": "F075", "name": "AnInp3 SL1", "cause": "4 mA at analog input 3, slave 1 fallen short of", "measure": "Check the connection of the signal source to\nthe SCI1 (slave 1) -X428: 10, 11."}, "F076": {"code": "F076", "name": "AnInp1 SL2", "cause": "4 mA at analog input 1, slave 2 fallen short of", "measure": "Check the connection of the signal source to\nthe SCI1 (slave 2) -X428: 4, 5."}, "F077": {"code": "F077", "name": "AnInp2 SL2", "cause": "4 mA at analog input 2, slave 2 fallen short of", "measure": "Check the connection of the signal source to\nthe SCI1 (slave 2) -X428: 7, 8."}, "F078":  "name": "Add. CB initialization fault", "cause": "", "measure": "A fault has occurred during initialization of the Fault value r949:\nCB board. 1: Board code incorrect\n2: TB/CB board not compatible\n3: CB board not compatible\n5: Error in configuration data\n6: Initialization timeout\n7: TB/CB board double\n10: Channel error\nCheck the T300 / CB board for correct\ncontacting and check the CB initialization\nparameters:\n- P918.02 CB Bus Address,\n- P711.02 to P721.02 CB Parameters 1 to 11"}, "F087": {"code": "F087", "name": "SIMOLINK initialization fault", "cause": "", "measure": "A fault has occurred during initialization of the - Replace CU (-A10), or replace the unit\nSLB board. (Compact PLUS type)\n- Replace SLB"}, "F090": {"code": "F090", "name": "Mld Param.", "cause": "An error occurred when attempting to change\na parameter from the standstill measurement\nor the rotating measurement (Mot ID).", "measure": "Power down and power up again. If it\nreoccurs, replace CU (-A10), or replace the\nunit (Compact PLUS type)"}, "F091": {"code": "F091", "name": "Mld Time", "cause": "The rotating measurement takes longer than\nprogrammed in a measured status. The\nrelevant measuring interval is encrypted in\nparameter r949. Possible causes:\nLoad torque too high\nLoad torque not uniform\nRamp-function generator disabled", "measure": "Eliminate the cause and re-start the\nmeasurement (power up the converter again).\nIf it re-occurs, replace CU (-A10), or replace\nthe unit (Compact PLUS type)."}, "F095": {"code": "F095", "name": "Mld n(set)", "cause": "Due to entries for\n- Permissible phase sequence\n- Maximum frequency,\n- Minimum speed,\n- Changeover frequency between V and I\nmodel,\n- Start of field-weakening frequency,\n- Frequency suppression bandwidth\nit was not possible to determine a permissible\nfrequency range for the rotating measurement.", "measure": "There must be a 10 % frequency range which\nlies above 1.1 times the changeover frequency\nand below 0.9 times the start of field-\nweakening frequency.\nPossible counter-measures\n- Permit both phase sequences\n- Increase maximum frequency\n- Reduce minimum speed,\n- Reduce changeover frequency between the\nV and I model.\n- Reduce or remove the frequency\nsuppression bandwidth."}, "F096": {"code": "F096", "name": "Mld abort", "cause": "The rotating measurement was aborted due to\nthe inadmissible external intervention.", "measure": "The fault value in r949 defines the type of\nintervention:\n4 Setpoint inhibit\n5 Changeover, setpoint channel\n8 Unexpected change in the converter status\n12 Motor data set changeover (for function\nselection \"Compl. Mot ID\")\n13 Changeover to slave drive\n14 Motor data set changeover to data set with\nv/f_charac\n15 Controller inhibit is set\n16 Ramp-function generator is disabled\n17 Selection \"Tacho test\" for F controller\n18 Ramp-function generator stopped\nEliminate cause\n22 Inverter inhibit:\nCheck inverter release (P561)"}, "F097": {"code": "F097", "name": "Mld meausred value", "cause": "The measured values for the nominal ramp-up\ntime when optimizing the controller deviate too\ngreatly.\nCause: very unsteady load torque", "measure": "If necessary, increase the torque limit values\nto 100 percent"}, "F098": {"code": "F098", "name": "Mld Tachof", "cause": "The rotating measurement has detected a fault\nin the speed actual value signal. The fault\nvalue defines the type of fault.\nThe fault measurement may have been\nerroneously generated if the drive speed is\nexternally forced (e.g. completely locked drive\ngenerates the \"no signal\" message)", "measure": "The fault value in r949 defines the type of\nintervention\n4 No speed signal present\n5 Sign of the signal is incorrect\n6 A track signal is missing\n7 Incorrect gain\n8 Incorrect pulse number\nChecking the measurement cables.\nChecking the parameters\n- P130 Src Speed ActV\n- P1151 Encoder Pulse #"}, "F100": {"code": "F100", "name": "GRND Init 14-12", "cause": "During the // ---------- Speech to code parsing ----------
const NUM_WORDS = {
  zero:0, oh:0, o:0, one:1, two:2, to:2, too:2, three:3, tree:3, four:4, for:4,
  five:5, six:6, seven:7, eight:8, ate:8, nine:9, ten:10, eleven:11, twelve:12,
  thirteen:13, fourteen:14, fifteen:15, sixteen:16, seventeen:17, eighteen:18,
  nineteen:19, twenty:20, thirty:30, forty:40, fifty:50, sixty:60, seventy:70,
  eighty:80, ninety:90, hundred:100
};

function wordsToDigits(s) {
  // turn "zero zero one" -> "001", "twenty one" -> "21", "one hundred" -> "100"
  const tokens = s.toLowerCase().split(/[\s\-]+/);
  let out = '';
  let pending = null; // for tens + ones
  function flushPending() {
    if (pending !== null) { out += pending; pending = null; }
  }
  for (const t of tokens) {
    if (t in NUM_WORDS) {
      const n = NUM_WORDS[t];
      if (n === 100 && pending !== null) {
        pending = pending * 100;
      } else if (n >= 20 && n < 100) {
        flushPending();
        pending = n;
      } else if (n < 10) {
        if (pending !== null && pending >= 20 && pending < 100) {
          pending += n;
        } else if (pending !== null) {
          out += pending;
          pending = n;
        } else {
          out += n;
        }
      } else {
        flushPending();
        out += n;
      }
    } else if (/^\d+$/.test(t)) {
      flushPending();
      out += t;
    } else {
      flushPending();
      out += ' ' + t + ' ';
    }
  }
  flushPending();
  return out;
}

function extractCode(raw) {
  if (!raw) return null;
  let s = raw.toLowerCase().trim();
  // map phonetic letter names
  s = s.replace(/\beff\b/g, 'f').replace(/\bef\b/g, 'f').replace(/\bay\b/g, 'a');
  // direct match like f001
  let m = s.match(/\b(ff|f|a)\s*(\d{1,3})\b/);
  if (m) {
    return normalizeCode(m[1], m[2]);
  }
  // digits in words
  const withDigits = wordsToDigits(s);
  m = withDigits.match(/\b(ff|f|a)\s*(\d{1,3})\b/);
  if (m) return normalizeCode(m[1], m[2]);
  // maybe "fault one" or bare number
  m = withDigits.match(/\b(?:fault|error|code|tekal)\s+(\d{1,3})\b/);
  if (m) return normalizeCode('f', m[1]);
  // bare "F" then space then digits that got concatenated
  return null;
}

function normalizeCode(letter, num) {
  letter = letter.toUpperCase();
  const n = parseInt(num, 10);
  if (letter === 'FF') return 'FF' + String(n).padStart(2, '0');
  return letter + String(n).padStart(3, '0');
}

// ---------- UI ----------
function showResult(code) {
  const res = document.getElementById('result');
  const f = FAULTS[code];
  if (!f) {
    // suggest close matches
    const keys = Object.keys(FAULTS);
    const near = keys.filter(k => k.startsWith(code.slice(0,2))).slice(0, 12);
    res.innerHTML = `
      <div class="card error">
        <div class="code-row"><span class="code-badge">${code}</span>
          <span class="code-name">קוד לא נמצא במדריך</span></div>
        <div class="suggest">קרובים: ${near.map(k => `<span onclick="manualLookup('${k}')">${k}</span>`).join('')}</div>
      </div>`;
    return;
  }
  res.innerHTML = `
    <div class="card">
      <div class="code-row">
        <span class="code-badge">${f.code}</span>
        <span class="code-name">${escapeHtml(f.name)}</span>
      </div>
      <div class="section cause">
        <h3>סיבה (Cause)</h3>
        <pre>${escapeHtml(f.cause)}</pre>
      </div>
      <div class="section measure">
        <h3>פתרון / פעולה (Counter-measure)</h3>
        <pre>${escapeHtml(f.measure)}</pre>
      </div>
    </div>`;
  res.scrollIntoView({behavior:'smooth', block:'start'});
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

function manualLookup(code) {
  showResult(code.toUpperCase());
}

document.getElementById('manualBtn').onclick = () => {
  const v = document.getElementById('manualInput').value.trim().toUpperCase();
  if (v) manualLookup(v);
};
document.getElementById('manualInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('manualBtn').click();
});

// ---------- Web Speech API ----------
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn = document.getElementById('micBtn');
const heard = document.getElementById('heard');
const status = document.getElementById('status');

if (!SR) {
  micBtn.disabled = true;
  status.innerHTML = '<span class="err-msg">דפדפן זה לא תומך בזיהוי דיבור. השתמש ב-Chrome.</span>';
} else {
  const rec = new SR();
  rec.lang = 'en-US';
  rec.interimResults = true;
  rec.continuous = false;
  let listening = false;

  rec.onstart = () => { listening = true; micBtn.classList.add('listening');
    micBtn.innerHTML = '🔴<br>מקשיב...'; heard.textContent = ''; };
  rec.onend = () => { listening = false; micBtn.classList.remove('listening');
    micBtn.innerHTML = '🎤<br>לחץ ודבר'; };
  rec.onerror = (e) => { status.innerHTML = '<span class="err-msg">שגיאת זיהוי: '+e.error+'</span>'; };
  rec.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const tr = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += tr;
      else interim += tr;
    }
    heard.textContent = 'שמעתי: ' + (final || interim);
    if (final) {
      const code = extractCode(final);
      if (code) {
        status.textContent = 'זוהה: ' + code;
        showResult(code);
      } else {
        status.innerHTML = '<span class="err-msg">לא זוהה קוד. נסה שוב או הקלד ידנית.</span>';
      }
    }
  };

  micBtn.onclick = () => {
    if (listening) { rec.stop(); return; }
    try { status.textContent=''; rec.start(); }
    catch(e) { status.innerHTML = '<span class="err-msg">'+e.message+'</span>'; }
  };
}
