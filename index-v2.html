<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>מדריך תקלות Siemens SIMOVERT MASTERDRIVES — v2</title>
<style>
  /* ============ THEMES ============ */
  :root {
    --bg:#0f172a; --panel:#1e293b; --panel2:#0b1220;
    --accent:#38bdf8; --ok:#22c55e; --err:#ef4444; --warn:#f59e0b;
    --text:#e2e8f0; --muted:#94a3b8; --border:#334155;
    --shadow:0 10px 30px rgba(0,0,0,.35);
    --base:16px; --btn:44px; --radius:14px;
  }
  body.theme-night {
    --bg:#000; --panel:#0a0a0a; --panel2:#050505;
    --accent:#b91c1c; --ok:#7f1d1d; --err:#dc2626; --warn:#991b1b;
    --text:#b91c1c; --muted:#7f1d1d; --border:#1a1a1a;
    --shadow:none;
  }
  body.theme-hc {
    --bg:#000; --panel:#111; --panel2:#000;
    --accent:#facc15; --ok:#facc15; --err:#ef4444; --warn:#facc15;
    --text:#facc15; --muted:#eab308; --border:#facc15;
    --shadow:none;
  }
  body.glove {
    --base:22px; --btn:64px; --radius:18px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; }
  body {
    font-family:-apple-system,"Segoe UI",Arial,sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; font-size:var(--base); line-height:1.5;
    transition:background .2s,color .2s;
  }
  button { font-family:inherit; cursor:pointer; }

  /* ============ HEADER ============ */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; border-bottom:1px solid var(--border);
    background:var(--panel); position:sticky; top:0; z-index:10;
  }
  header h1 { margin:0; font-size:1.1rem; color:var(--accent); }
  header .sub { color:var(--muted); font-size:.8rem; }
  .toolbar { display:flex; gap:8px; }
  .tool-btn {
    min-width:var(--btn); height:var(--btn);
    border-radius:var(--radius); border:1px solid var(--border);
    background:var(--panel2); color:var(--text);
    font-size:1.25rem; display:flex; align-items:center; justify-content:center;
    padding:0 14px;
  }
  .tool-btn.active { background:var(--accent); color:var(--panel2); border-color:var(--accent); }
  .tool-btn:hover { filter:brightness(1.15); }

  main { max-width:960px; margin:0 auto; padding:18px; }

  /* ============ MIC AREA ============ */
  .mic-area { text-align:center; padding:22px 10px; }
  #micBtn {
    width:calc(var(--btn) * 3); height:calc(var(--btn) * 3);
    border-radius:50%; background:var(--accent); color:var(--panel2);
    border:none; font-size:1.2rem; font-weight:700;
    box-shadow:0 0 0 0 rgba(56,189,248,.6); transition:transform .2s;
  }
  #micBtn:hover { transform:scale(1.04); }
  #micBtn.listening { background:var(--err); color:#fff; animation:pulse 1.2s infinite; }
  @keyframes pulse {
    0%   { box-shadow:0 0 0 0    rgba(239,68,68,.7); }
    70%  { box-shadow:0 0 0 30px rgba(239,68,68,0); }
    100% { box-shadow:0 0 0 0    rgba(239,68,68,0); }
  }
  #handsFreeBtn.on { background:var(--err); color:#fff; border-color:var(--err); }
  .heard { margin-top:12px; color:var(--muted); font-size:.95rem; min-height:1.4em; direction:ltr; }
  .manual { margin-top:12px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .manual input {
    padding:10px 14px; font-size:1rem; border-radius:var(--radius);
    border:1px solid var(--border); background:var(--panel); color:var(--text);
    width:160px; text-align:center; text-transform:uppercase; direction:ltr;
    min-height:var(--btn);
  }
  .manual button {
    padding:0 18px; min-height:var(--btn); background:var(--panel); color:var(--text);
    border:1px solid var(--border); border-radius:var(--radius); font-size:1rem;
  }
  .status { text-align:center; color:var(--muted); font-size:.8rem; margin-top:8px; min-height:1.2em; }
  .err-msg { color:var(--err); }

  /* ============ STEPPED CARD ============ */
  .stage {
    margin-top:18px; background:var(--panel); border-radius:var(--radius);
    box-shadow:var(--shadow); border:1px solid var(--border);
    overflow:hidden; min-height:420px;
    display:flex; flex-direction:column;
  }
  .stage.hidden { display:none; }
  .stage-top {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; background:var(--panel2); border-bottom:1px solid var(--border);
  }
  .progress { display:flex; gap:6px; align-items:center; }
  .dot { width:10px; height:10px; border-radius:50%; background:var(--border); }
  .dot.done { background:var(--ok); }
  .dot.active { background:var(--accent); transform:scale(1.25); }
  .step-counter { font-size:.85rem; color:var(--muted); direction:ltr; font-family:monospace; }
  .stage-actions { display:flex; gap:6px; }
  .icon-btn {
    min-width:var(--btn); height:var(--btn); border-radius:var(--radius);
    background:transparent; color:var(--text); border:1px solid var(--border);
    font-size:1.1rem; display:flex; align-items:center; justify-content:center; padding:0 10px;
  }
  .icon-btn.star.on { color:var(--warn); border-color:var(--warn); }
  .icon-btn.reading { background:var(--accent); color:var(--panel2); border-color:var(--accent); }

  .fault-header {
    display:none; align-items:center; gap:12px; padding:10px 16px;
    background:var(--panel); border-bottom:1px solid var(--border);
  }
  .fault-header.show { display:flex; }
  .fault-header .fh-code {
    font-family:monospace; font-weight:800; font-size:1.1rem;
    color:var(--accent); background:var(--panel2);
    padding:6px 12px; border-radius:8px;
    border:2px solid var(--accent); direction:ltr;
  }
  .fault-header .fh-name {
    font-size:1rem; font-weight:600; color:var(--text);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  .step-body {
    flex:1; padding:28px 22px; display:flex; flex-direction:column;
    justify-content:center; align-items:stretch; text-align:center;
  }
  .step-body .code-badge {
    font-size:2.6rem; font-weight:800; color:var(--accent);
    background:var(--panel2); padding:12px 24px; border-radius:var(--radius);
    font-family:monospace; direction:ltr; display:inline-block; margin:0 auto;
    border:2px solid var(--accent);
  }
  .step-body .code-name { font-size:1.4rem; margin-top:16px; font-weight:600; direction:ltr; }
  .step-body .section-label { font-size:.9rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:14px; direction:ltr; }
  .step-body ul.bullets { text-align:right; direction:ltr; padding:0; margin:0 auto; max-width:620px; list-style:none; }
  .step-body ul.bullets li {
    padding:12px 16px; margin:8px 0; background:var(--panel2);
    border-left:4px solid var(--accent); border-radius:8px;
    font-size:1.05rem; line-height:1.55; text-align:left;
  }
  .step-body .big-num {
    font-size:5rem; font-weight:800; color:var(--ok);
    background:var(--panel2); width:120px; height:120px; border-radius:50%;
    margin:0 auto 18px; display:flex; align-items:center; justify-content:center;
    border:4px solid var(--ok);
  }
  .step-body .step-text {
    font-size:1.3rem; line-height:1.55; max-width:620px; margin:0 auto;
    direction:ltr; text-align:left;
  }
  .step-body .summary-done { font-size:2.2rem; color:var(--ok); margin:0 0 10px; }
  .step-body .related { margin-top:14px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; direction:ltr; }
  .step-body .related span {
    padding:8px 14px; background:var(--panel2); border:1px solid var(--border);
    border-radius:var(--radius); font-family:monospace; cursor:pointer; font-size:1rem;
  }
  .step-body .related span:hover { background:var(--border); }

  /* SVG diagram */
  .diagram-wrap {
    max-width:560px; margin:0 auto; background:var(--panel2);
    padding:16px; border-radius:var(--radius); border:1px solid var(--border);
  }
  .diagram-wrap svg { width:100%; height:auto; display:block; }
  .diagram-caption { color:var(--muted); font-size:.85rem; margin-top:8px; direction:ltr; }

  /* ============ NAV FOOTER ============ */
  .stage-nav {
    display:flex; gap:10px; padding:14px; border-top:1px solid var(--border);
    background:var(--panel2);
  }
  .nav-btn {
    flex:1; min-height:calc(var(--btn) * 1.2); font-size:1.1rem; font-weight:700;
    background:var(--panel); color:var(--text); border:2px solid var(--border);
    border-radius:var(--radius);
  }
  .nav-btn.primary { background:var(--accent); color:var(--panel2); border-color:var(--accent); }
  .nav-btn:disabled { opacity:.35; cursor:not-allowed; }

  /* ============ ERROR CARD ============ */
  .error-card {
    margin-top:18px; background:var(--panel); border-radius:var(--radius);
    padding:22px; border-left:4px solid var(--err); text-align:center;
  }
  .error-card h2 { margin:0 0 8px; color:var(--err); }
  .suggest { margin-top:12px; display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .suggest span {
    padding:8px 14px; background:var(--panel2); border:1px solid var(--border);
    border-radius:8px; cursor:pointer; direction:ltr; font-family:monospace;
  }

  /* ============ FAVORITES DRAWER ============ */
  .favs {
    margin-top:22px; background:var(--panel); border-radius:var(--radius);
    padding:14px 16px; border:1px solid var(--border);
  }
  .favs h3 { margin:0 0 10px; color:var(--warn); font-size:1rem; }
  .favs .empty { color:var(--muted); font-size:.9rem; }
  .fav-list { display:flex; gap:8px; flex-wrap:wrap; }
  .fav-chip {
    padding:8px 14px; background:var(--panel2); border:1px solid var(--border);
    border-radius:var(--radius); cursor:pointer; direction:ltr; font-family:monospace;
    display:flex; align-items:center; gap:6px;
  }
  .fav-chip .rm { color:var(--muted); font-size:.85rem; }

  .footer { text-align:center; color:var(--muted); font-size:.75rem; padding:20px; }

  /* ============ MOBILE (≤ 640px) ============ */
  @media (max-width:640px) {
    :root { --base:17px; --btn:48px; }

    header { padding:10px 12px; gap:8px; }
    header h1 { font-size:1rem; line-height:1.2; }
    header .sub { display:none; }
    .toolbar { gap:6px; }
    .tool-btn { min-width:48px; height:48px; font-size:1.2rem; padding:0 10px; }

    main { padding:12px; }

    .mic-area { padding:16px 4px; }
    #micBtn { width:160px; height:160px; font-size:1.05rem; }

    .manual { gap:6px; }
    .manual input {
      flex:1 1 160px; min-width:120px; max-width:260px;
      padding:12px; font-size:1.05rem; min-height:52px;
    }
    .manual button { min-height:52px; padding:0 16px; font-size:1rem; }
    #handsFreeBtn { flex:1 1 100%; min-height:52px; }

    .stage { min-height:360px; border-radius:12px; }
    .stage-top { padding:8px 10px; }
    .fault-header { padding:8px 12px; gap:10px; }
    .fault-header .fh-code { font-size:1rem; padding:5px 10px; }
    .fault-header .fh-name { font-size:.95rem; }
    .stage-actions { gap:4px; }
    .icon-btn { min-width:48px; height:48px; padding:0 8px; font-size:1.1rem; }
    .step-counter { font-size:.8rem; }
    .dot { width:8px; height:8px; }

    .step-body { padding:22px 14px; }
    .step-body .code-badge { font-size:2.2rem; padding:10px 18px; }
    .step-body .code-name { font-size:1.15rem; }
    .step-body .section-label { font-size:.8rem; margin-bottom:10px; }
    .step-body ul.bullets li { padding:10px 14px; font-size:1rem; }
    .step-body .big-num { width:96px; height:96px; font-size:3.6rem; border-width:3px; margin-bottom:14px; }
    .step-body .step-text { font-size:1.1rem; }
    .step-body .summary-done { font-size:1.8rem; }
    .step-body .related span { padding:10px 16px; font-size:1rem; }

    .stage-nav { padding:10px; gap:8px; }
    .nav-btn { min-height:58px; font-size:1.05rem; }

    .favs { padding:12px; }
    .fav-chip { padding:10px 14px; font-size:1rem; }
  }

  /* ============ SMALL PHONES (≤ 380px) ============ */
  @media (max-width:380px) {
    header h1 { font-size:.9rem; }
    .tool-btn { min-width:44px; padding:0 6px; font-size:1.1rem; }
    #micBtn { width:140px; height:140px; font-size:1rem; }
    .step-body { padding:18px 10px; }
    .step-body .code-badge { font-size:1.9rem; }
    .step-body .big-num { width:84px; height:84px; font-size:3rem; }
    .nav-btn { font-size:1rem; min-height:54px; }
  }

  /* Prevent iOS auto-zoom on input focus by keeping font ≥ 16px */
  @media (hover:none) and (pointer:coarse) {
    .manual input { font-size:16px; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>SIMOVERT MASTERDRIVES — v2</h1>
    <div class="sub">Voice-controlled fault guide • <span id="codeCount"></span> codes</div>
  </div>
  <div class="toolbar">
    <button class="tool-btn" id="themeBtn" title="Theme (day/night/hc)">🌓</button>
    <button class="tool-btn" id="gloveBtn" title="Glove mode (big buttons)">🧤</button>
    <button class="tool-btn" id="favBtn" title="Favorites">⭐</button>
  </div>
</header>

<main>
  <div class="mic-area" id="micArea">
    <button id="micBtn">🎤<br>Press &amp; speak</button>
    <div class="heard" id="heard"></div>
    <div class="manual">
      <input id="manualInput" placeholder="F001" maxlength="5">
      <button id="manualBtn">Search</button>
      <button class="tool-btn" id="handsFreeBtn" title="Hands-free mode" style="min-width:auto;padding:0 18px;">🙌 Hands-free</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="stage hidden" id="stage">
    <div class="stage-top">
      <div class="progress" id="progress"></div>
      <div class="step-counter" id="stepCounter">1 / 5</div>
      <div class="stage-actions">
        <button class="icon-btn star" id="starBtn" title="Favorite">⭐</button>
        <button class="icon-btn" id="readBtn" title="Read aloud">🔊</button>
        <button class="icon-btn" id="closeBtn" title="Close">✕</button>
      </div>
    </div>
    <div class="fault-header" id="faultHeader"></div>
    <div class="step-body" id="stepBody"></div>
    <div class="stage-nav">
      <button class="nav-btn" id="prevBtn">◀ Back</button>
      <button class="nav-btn primary" id="nextBtn">Next ▶</button>
    </div>
  </div>

  <div id="errorSlot"></div>

  <div class="favs" id="favsPanel" style="display:none;">
    <h3>⭐ Favorites</h3>
    <div id="favList" class="fav-list"></div>
  </div>
</main>

<div class="footer">
  Siemens SIMOVERT MASTERDRIVES Vector Control — Operating Instructions (6SE7087-6JK60) • v2
</div>

<script>
// Data: 226 fault codes embedded as one object literal below.
const FAULTS = {"F001":{"code":"F001","name":"Main contactor checkback","cause":"If a main contactor checkback is configured, no checkback occurs within the time set in P600 after the power-up command.\n\nIn the case of externally excited synchronous motors (P095 = 12), there is no checkback for the excitation current unit.","measure":"P591 Src Contactor Msg\n\nParameter value must be in conformance with the connection of the main contactor checkback.\n\nCheck the checkback loop of the main contactor (or the checkback of the excitation current unit in the case of synchronous motors)."},"F002":{"code":"F002","name":"Pre-charging","cause":"When pre-charging, the minimum DC link voltage (P071 Line Volts x 1.34) of 80 % has not been reached.\n\nThe maximum pre-charging time of 3 seconds has been exceeded.","measure":"Check the supply voltage.\n\nCompare with P071 Line Volts (compare P071 with the DC link voltage on DC units).\n\nCheck the rectifier/regenerative unit on DC units. The rectifier/regenerative unit must be switched on before the inverter is switched on."},"F006":{"code":"F006","name":"DC link overvoltage","cause":"Shutdown has occurred due to excessive DC link voltage.\n\nLine voltage / DC link voltage range / Shutdown value:\n200 V - 230 V  |  270 V - 310 V  |  appr. 410 V\n380 V - 480 V  |  510 V - 650 V  |  appr. 820 V\n500 V - 600 V  |  675 V - 810 V  |  appr. 1020 V\n660 V - 690 V  |  890 V - 930 V  |  appr. 1220 V\n\nFor parallel-connected converters (BF M,N):\nr949 = 1: Overvoltage in the DC link of the master\nr949 = 2: Overvoltage in the DC link of the slave","measure":"Check the supply voltage or input DC voltage.\n\nConverter is operating in regenerative mode without feedback possibility.\n\nIf the converter supply voltage is at the upper tolerance limit and it is operating at full load, F006 can also be caused by a line phase failure.\n\nPossibly:\n- Increase P464 Decel Time\n- Activate P515 DC Bus Volts Reg (check P071 beforehand)\n- Reduce P526 Fly Search Speed\n- Reduce P259 Max Regen Power (only for P100 = 3, 4 or 5)"},"F008":{"code":"F008","name":"DC link undervoltage","cause":"The lower limit value of 76 % of the DC link voltage (P071 Line Volts), or of 61 % when kinetic buffering has been enabled, has been fallen short of.\n\nUndervoltage in the DC link in 'normal' operation (i.e. no SIMULATION).\n\nUndervoltage in the DC link with active kinetic buffering and speed less than 10 % of the rated motor speed.\n\nIt was a 'brief power failure' which was not detected until system recovery (auto restart flag).","measure":"Check:\n- Input DC voltage\n- DC link"},"F010":{"code":"F010","name":"DC link overvoltage","cause":"Due to excessive DC link voltage, shutdown has taken place:\nLine voltage  |  DC link range  |  Shutdown value\n380 V - 480 V  |  510 V - 650 V  |  740 V\n\nNote: Only at U800 = 1 and f(Pulse) > f(derating).\n\nLower threshold value than F006!","measure":"Check the supply voltage.\nCheck the braking resistor.\nConverter operates regeneratively without a feedback possibility. Braking unit must be set to the lower response threshold (673 V)."},"F011":{"code":"F011","name":"Overcurrent","cause":"Overcurrent shutdown has occurred. The shutdown threshold has been exceeded.","measure":"- Check the converter output for short-circuit or earth fault.\n- Check the load for an overload condition.\n- Check whether motor and converter are correctly matched.\n- Check whether the dynamic requirements are too high."},"F012":{"code":"F012","name":"I too low","cause":"During excitation of the induction motor, the current did not rise above 12.5 % of the setpoint magnetizing current for no-load operation.","measure":"Only for closed loop n/f/T control (P100 = 3, 4 or 5).\n\nIf no motor is connected, go into the simulation mode P372.\n\nCheck current detection, check power section."},"F014":{"code":"F014","name":"I too low","cause":"During excitation of the motor, the current component is less than 25 % of the motor no-load current.\n\nNote: Only for U800 = 1. Irrespective of the type of control (Difference to F012).","measure":"Check the output contactor.\nCheck the motor cable."},"F015":{"code":"F015","name":"Motor stall","cause":"Motor has stalled or is locked:\n- if the static load is too high\n- if the acceleration or deceleration time is too fast, or if load change is too fast and too great\n- due to incorrect parameterization of the pulse encoder pulse number P151 or of the analog tachometer scaling P138\n- due to disturbed speed signals (tachometer shield not connected)\n\nThe fault is only generated after the time set in P805.\n\nThe binector B0156 is set in the status word 2 r553 Bit 28.\n\nTo detect whether the drive is blocked, see P792 (Perm Deviation) and P794. With n/f control, this fault is tripped if the torque limits have been reached (B0234).\n\nWith speed control (P100 = 4) and master drive (see P587), the fault can also point to an interruption in the encoder cable. This case has the same significance as if the drive is locked.\n\nWith v/f control, the I(max) controller has to be activated (P331). The monitor does not operate with v/f textile applications (P100 = 2).\n\nIn the case of synchronous motors (P095 = 12, 13): by reaching the maximum frequency.\n\nIn the case of externally excited synchronous motors (P095 = 12): as a result of missing or excessively high excitation current (flux is too small or too great).\n\nWhen the maximum frequency (including control reserves) (B0254) has been reached on synchronous motors, the fault is generated immediately. If the deviations in the rotor flux are too great, first of all, the converter current is switched to zero, the excitation current is reduced and, after some time, the fault message is tripped at the level of the double damping time constant (2*r124.1). During this wait time, the status word bit B0156 (r553.28) is set already.","measure":"- Reduce load\n- Release brake\n- Increase current limits\n- Increase P805 PullOut/BlckTime\n- Increase P792 response threshold for set/actual deviation\n\nOnly for f/n/T control (P100 = 3, 4, 5):\n- Increase torque limits or torque setpoint\n\nOnly n/T control or v/f control with speed controller (P100 = 0, 4, 5):\n- Check tachometer cable break\n- Check pulse encoder pulse number\n- Check analog tachometer scaling\n- Connect shield of tachometer cable on motor side and converter side\n- Reduce smoothing of speed pre-control P216 (only n/T control)\n\nOnly frequency control (P100 = 3):\n- Slow down acceleration time (see also P467 ProfRampGen Gain)\n- Increase current in the lower frequency range (P278, P279, P280)\n\nOnly for synchronous motor (P095 = 12):\n- Switch in speed controller pre-control (P471>0)\n- Set EMF controller more dynamically (315) to max. approx. 2\n- Increase changeover frequency for the EMF model (P313)\n- Replace by speed control with pulse encoder in the case of overmodulated n/f controller\n- Track speed setpoint with the speed actual value so that the set/actual deviation is always less than that set in P792.\n- Check current limits of the excitation unit.\n- Check excitation current setpoint and actual value (incl. wiring).\n- Check voltage limits of the excitation unit during dynamic current changes.\n- Check drive system for resonance oscillations."},"F018":{"code":"F018","name":"F set fly","cause":"The found set frequency could not be implemented. Reasons:\n- Additional setpoint 2 too high\n- Speed actual-value at standstill negative (signal ripple) and negative direction of rotation locked.","measure":"- Check additional setpoint 2\n- Release negative directions of rotation with low maximum speed."},"F019":{"code":"F019","name":"Motor not found","cause":"During flying restart without tachometer: Search in both directions of rotation not possible (one direction blocked) and motor has not been found.","measure":"Power up after coasting.\nPossibly increase P525 Fly Search Amps.\nEnable both directions of rotation (P571, P572)."},"F020":{"code":"F020","name":"Motor temperature","cause":"The motor temperature limit value has been exceeded.\n\nr949 = 1 limit value of motor temperature exceeded\nr949 = 2 short-circuit in the cable to the motor temperature sensor or sensor defective\nr949 = 4 wire break in the cable to the motor temperature sensor or sensor defective\nr949 = 5 wire break and limit value exceeded","measure":"Check the motor (load, ventilation, etc.). The current motor temperature can be read in r009 Motor Temperature.\n\nCheck P381 Mot Tmp.\n\nFault — check the KTY84 input at connector -X103:29,30, or X104:29,30 (Compact PLUS) for short-circuit."},"F021":{"code":"F021","name":"Motor I2t","cause":"Parameterized limit value of the I2t monitoring for the motor has been exceeded.","measure":"Check: P383 Mot Tmp T1."},"F023":{"code":"F023","name":"Inverter temperature","cause":"The limit value of the inverter temperature has been exceeded.\n\nAlarm: (r949):\nBit0  Inverter overtemperature\nBit1  Wire break of cable to temperature sensor\nBit4  Number of the temperature sensor\nBit5\nBit6\nBit8  Multiparallel circuit: Slave number\nBit9\nBit10\n\nExamples:\nr949 = 1: Limit value of inverter temperature has been exceeded.\nr949 = 2: Sensor 1: wire break of sensor cable or sensor defective\nr949 = 18: Sensor 2: wire break of sensor cable or sensor defective\nr949 = 34: Sensor 3: wire break of sensor cable or sensor defective\nr949 = 50: Sensor 4: wire break of sensor cable or sensor defective.","measure":"- Measure the air intake and ambient temperature (Observe minimum and maximum ambient temperature!)\n- Observe the derating curves at theta >45°C (Compact PLUS type) or 40°C.\n- On Compact PLUS units: ≥ 22 kW acknowledgement is only possible after 1 minute.\n\nCheck:\n- whether the fan -E1 is connected and is rotating in the correct direction\n- that the air entry and discharge openings are not restricted\n- temperature sensor at -X30"},"F025":{"code":"F025","name":"UCE upper switch / UCE Ph. L1","cause":"UCE upper switch (Compact PLUS) / or UCE has tripped in phase L1.","measure":"Check:\n- phase L1 for short-circuit or ground fault (-X2:U2 - including motor)\n- that CU is correctly inserted\n- that the switch for \"SAFE STOP\" (X9/5-6) is open (only for units with order No. ...-11, ...-21, ...-31, ...-61)."},"F026":{"code":"F026","name":"UCE lower switch / UCE Ph. L2","cause":"UCE lower switch (Compact PLUS) / or UCE has tripped in phase L2.","measure":"Check:\n- phase L2 for short-circuit or ground fault (-X2:V2 - including motor)\n- that CU is correctly inserted\n- that the switch for 'SAFE STOP' (X9/5-6) is open (only for units with order Nos....-11, ...-21,...-31, ...-61)."},"F027":{"code":"F027","name":"Fault pulse resistor / UCE Ph. L3","cause":"Fault pulse resistor (Compact PLUS) / or UCE has tripped in phase L3.","measure":"Check:\n- phase L3 for short-circuit or ground fault (-X2:W2 - including motor)\n- that CU is correctly inserted\n- that the switch for 'SAFE STOP' (X9/5-6) is open (only for units with order Nos....-11, ...-21,...-31, ...-61)."},"F028":{"code":"F028","name":"Supply phase","cause":"The frequency and the amplitude of the DC link ripple indicate a single-phase power failure.","measure":"Check the supply voltage."},"F029":{"code":"F029","name":"Meas. value sensing","cause":"A fault has occurred in the measured value sensing system:\n\nThe measured variable at which a fault occurred during offset adjustment is bit-coded and stored in r949:\nBit 0: Current phase L1\nBit 1: Current phase L2\nBit 2: DC link voltage\nBit 3: Inverter temperature\nBit 4: Motor temperature\nBit 5: Analog input 1\nBit 6: Analog input 2\n\nExamples:\n- (r949 = 1) Offset adjustment in phase L1 not possible.\n- (r949 = 2) Offset adjustment in phase L3 not possible.\n- (r949 = 3) Offset adjustment in phases L1 and L3 not possible.","measure":"Causes in phase L1 and L2:\n- Fault in measured value sensing system\n- Fault in power section (valve cannot block)\n- Fault on CU\n\nCauses on all other measured variables:\n- Fault on CU (SIMA) -> replace CU"},"F035":{"code":"F035","name":"Ext. Fault 1","cause":"Parameterizable external fault input 1 has been activated.","measure":"Check:\n- whether there is an external fault\n- whether the cable to the appropriate digital input has been interrupted\n- P575 Src No ExtFault1"},"F036":{"code":"F036","name":"Ext. Fault 2","cause":"Parameterizable external fault input 2 has been activated.","measure":"Check:\n- whether there is an external fault\n- whether the cable to the appropriate digital input has been interrupted\n- P585 Src No ExtFault2"},"F037":{"code":"F037","name":"Analog input","cause":"An analog input is taking place in operating mode 4..20 mA and a wire break has occurred. The number of the analog input concerned is shown in fault value (r949).","measure":"Check the connection to:\n- Analog input 1 -X102:15, 16, or -X101:9,10 (Compact PLUS)\n- Analog input 2 -X102: 17, 18\n\nCheck parameters:\n- P632 CU AnaIn Conf\n- P634 CU AnaIn Smooth\n- P631 CU AnaIn Offset"},"F038":{"code":"F038","name":"Voltage OFF during parameter storage","cause":"During a parameter task, a voltage failure has occurred on the board.","measure":"Re-enter the parameter. The number of the parameter concerned can be seen in fault value r949."},"F040":{"code":"F040","name":"AS internal","cause":"Incorrect operating status.","measure":"Replace CU (-A10), or replace the unit (Compact PLUS type)."},"F041":{"code":"F041","name":"EEPROM fault","cause":"A fault has occurred when storing the values in the EEPROM.","measure":"Replace CU (-A10), or replace the unit (Compact PLUS type)."},"F042":{"code":"F042","name":"Calculating time","cause":"Calculating time problems.\nAt least 10 failures of time slots T2, T3, T4 or T5 (see also parameters r829.2 to r829.5).","measure":"Reduce the calculating time load:\n- Increase P357 Sampling Time\n- Calculate individual blocks in a slower sampling time\n\nObserve r829 CalcTimeHdroom."},"F044":{"code":"F044","name":"BICO manager fault","cause":"A fault has occurred during the softwiring of binectors and connectors.","measure":"Fault value r949:\n>1000 : Fault during softwiring of connectors\n>2000 : Fault during softwiring of binectors\n\n- Voltage OFF and ON\n- Factory setting and new parameterization\n- Replace the board"},"F045":{"code":"F045","name":"Opt. Board HW","cause":"A hardware fault has occurred when accessing an option board.","measure":"- Replace CU (-A10), or replace the unit (Compact PLUS).\n- Check connection of the board subrack to the option boards and replace if necessary."},"F046":{"code":"F046","name":"Par. Task","cause":"A fault has occurred during the transfer of parameters to the gating unit processor.","measure":"Power the unit down and up again.\nReplace CU (-A10), or replace the unit (Compact PLUS type)."},"F047":{"code":"F047","name":"Gating Calc Time","cause":"The calculating time in the gating unit computer is not sufficient.","measure":"Replace CU (-A10), or replace the unit (Compact PLUS).\n\nIn case of synchronous motors (P095 = 12): Pulse frequency set too high (P340>2kHz)."},"F048":{"code":"F048","name":"Gating Pulse Freq","cause":"The pulse frequency set in P340 is not permissible.","measure":"Change P340 Pulse Frequency."},"F049":{"code":"F049","name":"SW version","cause":"The firmware versions on the CU have different firmware release.","measure":"Use uniform firmware."},"F050":{"code":"F050","name":"TSY Init.","cause":"Error when initializing the TSY board.","measure":"Check:\n- Whether the TSY is correctly inserted"},"F051":{"code":"F051","name":"Speed encoder","cause":"Digital tachometer or analog tachometer sensing are faulty.","measure":"Check the parameters:\n- P130 Src SpdActV\n- P151 Pulse #\n- P138 AnalogTachScale\n- P109 Motor #PolePairs\n\nThe product of P109 and P138 must be smaller than 19200. Check or replace tachometer. Check connection to tachometer.\n\n- Replace CU (-A10), or replace the unit (Compact PLUS type)."},"F052":{"code":"F052","name":"n-Cntr.Input","cause":"Control track input (-X103/27, or -X104/27 Compact PLUS) is not high:\n- Tachometer line broken\n- Tachometer fault\n\nThe fault input on the TSY was activated.","measure":"Unselect tachometer with control track (P130 select motor encoder).\n\nCheck control track connection (-X103/27, or X104/27 Compact PLUS).\n\nExchange TSY."},"F053":{"code":"F053","name":"Tachometer dn/dt","cause":"The permissible change value of the speed encoder signal P215 dn(act,perm) has been doubly exceeded.","measure":"Check tachometer cables for interruptions.\nCheck earthing of tachometer shield.\n\n- The shield must be connected both at the motor and the converter side.\n- The encoder cable must not be interrupted.\n- The encoder cable must not be laid together with the power cables.\n- Only recommended encoders should be used.\n- In the case of a signal fault, the DT1 board may have to be used. If necessary, change P215.\n- With P806 (observe parameter description) it is possible during operation to switch over to encoder-free operation."},"F054":{"code":"F054","name":"Sensor board initialization fault","cause":"A fault has occurred during initialization of the encoder board.","measure":"Fault value r949:\n1. Board code incorrect\n2. TSY not compatible\n3. SBP not compatible\n7. Board double\n20: TSY board double\n60: Internal error"},"F056":{"code":"F056","name":"SIMOLINK telegram failure","cause":"Communication on the SIMOLINK ring is disturbed.","measure":"- Check the fiber-optic cable ring\n- Check whether an SLB in the ring is without voltage\n- Check whether an SLB in the ring is faulty\n- Check P741 (SLB TlgOFF)"},"F057":{"code":"F057","name":"Brake does not open","cause":"The brake has not opened, the output current of the converter has exceeded the parameterized current threshold (U840) for longer than one second (with the rotor locked).\n\nNote: Only with U800 = 1.","measure":"Check brake.\nCheck I(max) brake (U840). The set threshold must be at least 10% above the maximum possible acceleration current."},"F058":{"code":"F058","name":"Parameter fault - Parameter task","cause":"A fault has occurred during the processing of a parameter task.","measure":"No remedy."},"F059":{"code":"F059","name":"Parameter fault after factory setting/init.","cause":"A fault has occurred in the initialization phase during the calculation of a parameter.","measure":"The number of the inconsistent parameter is indicated in fault value r949. Correct this parameter (ALL indices) and switch voltage off and on again. Several parameters may be affected, i.e. repeat process."},"F060":{"code":"F060","name":"MLFB is missing","cause":"This is set if the MLFB = 0 after exiting INITIALIZATION (0.0 kW). MLFB = order number.","measure":"After acknowledgement, in INITIALIZATION enter a suitable MLFB in parameter P070 MLFB (6SE70..). (Only possible with the corresponding access stages to both access parameters)."},"F061":{"code":"F061","name":"Incorrect parameterization","cause":"A parameter entered during drive setting (e.g. P107 Mot Rtd Freq, P108 Mot Rtd Speed, P340 Pulse Frequency) is not in a permissible range (depending on control type).","measure":"Acknowledge the fault and change the corresponding parameter value. The missing parameter is indicated in r949 as a fault value."},"F062":{"code":"F062","name":"Multi-parallel circuit","cause":"Fault in connection with the multi-parallel circuit or board ImP1 has been detected.","measure":"r949 = 10: Communications card does not reply. When writing the control word, BUSY is not active if CSOUT is inactive. Communications card is probably not inserted.\n\nR949 = 11,12: Timeout during BUSY during initialization. BUSY does not become active within 1 sec.\n\nR949 = 15: Timeout during BUSY during normal communication. BUSY does not become active within 1 sec.\n\nR949 = 18: Timeout when reading out the fault information from the ImPIs. Within one second after activation of FAULT no fault cause can be supplied by the IMP1.\n\nR949 = 20+i: HW conflict. This is set if bit HWCONF is set in status word of slave i. (Fault in the configuration of the multi-parallel circuit)\n\nr949 = 30+i: HW version of ImPI is not compatible. The relevant slave number is contained in i.\n\nR949 = 40: Number of slaves does not tally with the setpoint number of slaves of the unit.\n\nR949 = 50+i: Inconsistency in the number of slaves. The number of slaves notified by the ImPI is not in conformance with the number of status words or with the setpoint number of slaves of the MLFB.\n\nCounter-measure:\n- Check ImPI or communications card and replace, if necessary.\n- Check configuration of multi-parallel circuit.\n- Check parameterization.\n- Replace CU.\n- Replace ImPI."},"F065":{"code":"F065","name":"Scom Telegram","cause":"No telegram was received at an Scom interface (Scom/USS protocol) within the telegram failure time.","measure":"Fault value r949:\n1 = interface 1 (SCom1)\n2 = interface 2 (SCom2)\n\n- Check the connection CU -X100:1 to 5 and check the connection PMU -X300.\n- Check the connection CU -X103, or X100/ 35,36 (Compact PLUS type)\n- Check 'SCom/SCB TLG OFF' P704.01 (SCom1) and P704.02 (SCom2).\n- Replace CU (-A10), or replace the unit (Compact PLUS type)."},"F070":{"code":"F070","name":"SCB initialization fault","cause":"A fault has occurred during initialization of the SCB board.","measure":"Fault value r949:\n1: Board code incorrect\n2: SCB board not compatible\n5: Error in configuration data (Check parameterization)\n6: Initialization timeout\n7: SCB board double\n10: Channel error"},"F072":{"code":"F072","name":"EB initialization fault","cause":"A fault has occurred during initialization of the EB board.","measure":"Fault value r949:\n2: 1st EB1 not compatible\n3: 2nd EB1 not compatible\n4: 1st EB2 not compatible\n5: 2nd EB2 not compatible\n21: Three EB1 boards\n22: Three EB2 boards\n\n110: Fault on 1st EB1 (Analog input)\n120: Fault on 2nd EB1 (Analog input)\n210: Fault on 1st EB2 (Analog input)\n220: Fault on 2nd EB2 (Analog input)"},"F073":{"code":"F073","name":"AnInp1 SL1","cause":"4 mA at analog input 1, slave 1 fallen short of.","measure":"Check the connection of the signal source to the SCI1 (slave 1) -X428: 4, 5."},"F074":{"code":"F074","name":"AnInp2 SL1","cause":"4 mA at analog input 2, slave 1 fallen short of.","measure":"Check the connection of the signal source to the SCI1 (slave 1) -X428: 7, 8."},"F075":{"code":"F075","name":"AnInp3 SL1","cause":"4 mA at analog input 3, slave 1 fallen short of.","measure":"Check the connection of the signal source to the SCI1 (slave 1) -X428: 10, 11."},"F076":{"code":"F076","name":"AnInp1 SL2","cause":"4 mA at analog input 1, slave 2 fallen short of.","measure":"Check the connection of the signal source to the SCI1 (slave 2) -X428: 4, 5."},"F077":{"code":"F077","name":"AnInp2 SL2","cause":"4 mA at analog input 2, slave 2 fallen short of.","measure":"Check the connection of the signal source to the SCI1 (slave 2) -X428: 7, 8."},"F078":{"code":"F078","name":"AnInp3 SL2","cause":"4 mA at analog input 3, slave 2 fallen short of.","measure":"Check the connection of the signal source to the SCI1 (slave 2) -X428: 10, 11."},"F079":{"code":"F079","name":"SCB telegram failure","cause":"No telegram has been received by the SCB (USS, peer-to-peer, SCI) within the telegram failure time.","measure":"- Check the connections of the SCB1(2).\n- Check P704.03 'SCom/SCB Tlg OFF'\n- Replace SCB1(2)\n- Replace CU (-A10)"},"F080":{"code":"F080","name":"TB/CB initialization fault","cause":"Fault during initialization of the board at the DPR interface.","measure":"Fault value r949:\n1: Board code incorrect\n2: TB/CB board not compatible\n3: CB board not compatible\n5: Error in configuration data\n6: Initialization timeout\n7: TB/CB board double\n10: Channel error\n\nCheck the T300/CB board for correct contacting, check the PSU power supply, check the CU / CB / T boards and check the CB initialization parameters:\n- P918.01 CB Bus Address\n- P711.01 to P721.01 CB parameters 1 to 11"},"F081":{"code":"F081","name":"OptBrdHeartbeat-Counter","cause":"Heartbeat-counter of the optional board is no longer being processed.","measure":"Fault value r949:\n0: TB/CB heatbeat-counter\n1: SCB heartbeat-counter\n2: Additional CB heartbeat-counter\n\n- Acknowledge the fault (whereby automatic reset is carried out)\n- If the fault re-occurs, replace the board concerned (see fault value)\n- Replace ADB\n- Check the connection between the subrack and the optional boards (LBA) and replace, if necessary"},"F082":{"code":"F082","name":"TB/CB telegram failure","cause":"No new process data have been received by the TB or the CB within the telegram failure time.","measure":"Fault value r949:\n1 = TB/CB\n2 = additional CB\n\n- Check the connection to TB/CB\n- Check P722 (CB/TB TlgOFF)\n- Replace CB or TB"},"F085":{"code":"F085","name":"Add. CB initialization fault","cause":"A fault has occurred during initialization of the CB board.","measure":"Fault value r949:\n1: Board code incorrect\n2: TB/CB board not compatible\n3: CB board not compatible\n5: Error in configuration data\n6: Initialization timeout\n7: TB/CB board double\n10: Channel error\n\nCheck the T300 / CB board for correct contacting and check the CB initialization parameters:\n- P918.02 CB Bus Address\n- P711.02 to P721.02 CB Parameters 1 to 11"},"F087":{"code":"F087","name":"SIMOLINK initialization fault","cause":"A fault has occurred during initialization of the SLB board.","measure":"- Replace CU (-A10), or replace the unit (Compact PLUS type)\n- Replace SLB"},"F090":{"code":"F090","name":"Mld Param.","cause":"An error occurred when attempting to change a parameter from the standstill measurement or the rotating measurement (Mot ID).","measure":"Power down and power up again. If it reoccurs, replace CU (-A10), or replace the unit (Compact PLUS type)."},"F091":{"code":"F091","name":"Mld Time","cause":"The rotating measurement takes longer than programmed in a measured status. The relevant measuring interval is encrypted in parameter r949. Possible causes:\nLoad torque too high\nLoad torque not uniform\nRamp-function generator disabled","measure":"Eliminate the cause and re-start the measurement (power up the converter again). If it re-occurs, replace CU (-A10), or replace the unit (Compact PLUS type)."},"F095":{"code":"F095","name":"Mld n(set)","cause":"Due to entries for\n- Permissible phase sequence\n- Maximum frequency\n- Minimum speed\n- Changeover frequency between V and I model\n- Start of field-weakening frequency\n- Frequency suppression bandwidth\nit was not possible to determine a permissible frequency range for the rotating measurement.","measure":"There must be a 10 % frequency range which lies above 1.1 times the changeover frequency and below 0.9 times the start of field-weakening frequency.\n\nPossible counter-measures:\n- Permit both phase sequences\n- Increase maximum frequency\n- Reduce minimum speed\n- Reduce changeover frequency between the V and I model\n- Reduce or remove the frequency suppression bandwidth."},"F096":{"code":"F096","name":"Mld abort","cause":"The rotating measurement was aborted due to the inadmissible external intervention.","measure":"The fault value in r949 defines the type of intervention:\n4  Setpoint inhibit\n5  Changeover, setpoint channel\n8  Unexpected change in the converter status\n12 Motor data set changeover (for function selection 'Compl. Mot ID')\n13 Changeover to slave drive\n14 Motor data set changeover to data set with v/f_charac\n15 Controller inhibit is set\n16 Ramp-function generator is disabled\n17 Selection 'Tacho test' for F controller\n18 Ramp-function generator stopped\nEliminate cause\n\n22 Inverter inhibit:\nCheck inverter release (P561)"},"F097":{"code":"F097","name":"Mld measured value","cause":"The measured values for the nominal ramp-up time when optimizing the controller deviate too greatly.\n\nCause: very unsteady load torque.","measure":"If necessary, increase the torque limit values to 100 percent."},"F098":{"code":"F098","name":"Mld Tachof","cause":"The rotating measurement has detected a fault in the speed actual value signal. The fault value defines the type of fault.\nThe fault measurement may have been erroneously generated if the drive speed is externally forced (e.g. completely locked drive generates the 'no signal' message).","measure":"The fault value in r949 defines the type of intervention:\n4 No speed signal present\n5 Sign of the signal is incorrect\n6 A track signal is missing\n7 Incorrect gain\n8 Incorrect pulse number\n\nChecking the measurement cables.\n\nChecking the parameters:\n- P130 Src Speed ActV\n- P1151 Encoder Pulse #"},"F100":{"code":"F100","name":"GRND Init","cause":"During the ground fault test, a current not equal to zero has been measured, or an UCE or overcurrent monitoring has responded, although no value has yet been triggered.","measure":"The cause of the fault can be read out from r376 'GrdFltTestResult'.\n\nCheck the converter output for short-circuit or ground fault (-X2:U2, V2, W2 - including motor).\n\nCheck that the CU is inserted correctly.\n\nSizes 1 and 2:\n- Check the transistor modules on the PEU board -A23 for short-circuit.\n\nSize 3 and 4:\n- Check the transistor modules -A100, -A200, -A300 for short-circuit."},"F101":{"code":"F101","name":"GRND UCE","cause":"During the ground fault test, the UCE monitoring has responded in a phase in which no valve has been triggered.","measure":"Check valves in the power section for short-circuit, and on converters with fiber-optic gating, check the gating unit wiring and the UCE checkbacks for correct assignment.\n\nR376 can be interrogated to indicate which UCE monitoring has responded."},"F102":{"code":"F102","name":"GRND Phase","cause":"During the ground fault test, a current flows in a phase in which no valve has been triggered or the UCE monitoring has responded in the phase in which the valve has been triggered.","measure":"The fault value can be read out from r949. The digit of the xth position indicates the valve where the fault occurred.\n\nX O O O  x = 1 = V+   x = 2 = V-   x = 3 = U+\n         x = 4 = U-   x = 5 = W+   x = 6 = W-\n\nThe figure of the xth digit indicates the phase in which I is 0 and thus a valve must be defective (always conductive).\n\nO O O X  x = 1 Phase 1 (U)\n         x = 3 = Phase 3 (W)\n         x = 4 = Phase 1 (U) or 3 (W)\n\nExamine phase for defective valves (always conductive)."},"F103":{"code":"F103","name":"Ground fault","cause":"There is a ground fault or a fault in the power section.\n\nDuring the ground fault test, a current flows from the phase in which a valve has been triggered, the overcurrent comparator has responded, or a UCE monitoring has responded in a phase in which a valve has been triggered.","measure":"Read out fault value from r949. The digit of the xth position indicates the valve where the fault occurred at power-up.\n\nX O O O   x = 1 = V+  x = 2 = V-   x = 3 = U+\nX O O O   x = 4 = U-  x = 5 = W+   x = 6 = W-\n\nCheck the motor including the feeder cable for short-circuit. If no ground fault is present, check the power section for defective valves (always conductive).\n\nThe digit of the xth position indicates the phase in which I is 0 and therefore a valve must be defective (always conductive).\n\nO O O X   1 = Current in phase 1 (U)\n          2 = UCE in phase 2 (V)\n          3 = Current in phase 3 (W)\n          4 = Only overcurrent occurred\n\nThe speed of the motor shaft during the ground-fault test should be less than 10 % of the rated speed!\n\n1) In phase V there is a ground fault or a defective valve or the 'SAFE STOP' switch (X9/5-6) is open (only for units with Order No. ...-11, ...-21, ...-31)."},"F107":{"code":"F107","name":"MLd = 0","cause":"A fault has occurred during the test pulse measurement.","measure":"Read out fault value from r949. The figures of the grey shaded areas indicate which fault has occurred.\n\nO O X X   xx = 01: Both current actual values remain 0\n          xx = 02: Motor-converter cable phase U interrupted\n          xx = 03: Motor converter phase V interrupted\n          xx = 04: Motor-converter phase W interrupted\n          xx = 05: Current actual value I1 remains 0\n          xx = 06: Current actual value I3 remains 0\n          xx = 07: Valve U+ does not trigger\n          xx = 08: Valve U- does not trigger\n          xx = 09: Valve V+ does not trigger\n          xx = 10: Valve V- does not trigger\n          xx = 11: Valve W+ does not trigger\n          xx = 12: Valve W- does not trigger\n          xx = 13: Sign I1 incorrect\n          xx = 14: Sign I3 incorrect\n          xx = 15: Sign I1 and I3 incorrect\n          xx = 16: Sign I1 confused with I3\n          xx = 17: I1 confused with I3 and both currents have an incorrect sign\n\nThe digit of the xth digit indicates where the fault has occurred.\n\nX O O O   x = 0 = Single converter\n          x = 1 = Inverter 1\n          x = 2 = Inverter 2\n          x = 3 = Inverters 1 and 2\n\nCheck that all 3 motor feeder cables and the motor windings do not have any interruption. Check the connection between the current converter and the electronics and check the current converter itself. Check the correct input of the rating plate data for the motor data set valid during the measurement."},"F108":{"code":"F108","name":"Mld Unsym","cause":"During the DC measurement, the measurement results for the individual phases differ significantly. The fault value indicates which quantity(ies) is(are) concerned and in which phase the greatest deviation occurred.","measure":"Read out fault value from r949. The digit of the xth position indicates:\n\nO O O X   Transverse voltage too high\n          x = 1 = phase R\n          x = 2 = phase S\n          x = 3 = phase T\n\nO O X O   Dev. stator resistance\n          (1, 2, 3 as above)\n\nX O O O   Dev. dead-time compensation\n          (1, 2, 3 as above)\n\nX O O O O Dev. valve voltage\n          (1, 2, 3 as above)\n\nThe motor, power section or actual-value sensing are significantly non-symmetrical."},"F109":{"code":"F109","name":"Mld R(L)","cause":"The rotor resistance determined during DC measurement deviates too significantly from the value which was calculated by the automatic parameterization from the rated slip.","measure":"- Incorrect input of rated speed or rated frequency\n- Pole pair number incorrect"},"F110":{"code":"F110","name":"Mld di/dt","cause":"During test pulse measurement, the current has increased significantly faster than was expected. Thus for the 1st test pulse, an overcurrent condition occurred within the first half of the minimum switch-on time.","measure":"- There may be a short-circuit between two converter outputs.\n- The motor rating plate data have not been correctly parameterized.\n- The motor leakage is too low."},"F111":{"code":"F111","name":"Fault e_Func","cause":"A fault has occurred while calculating the equalization function.","measure":""},"F112":{"code":"F112","name":"Unsym I_sigma","cause":"The individual leakage test results deviate too significantly.","measure":""},"F114":{"code":"F114","name":"Mld OFF","cause":"The converter has automatically stopped the automatic measurement due to the time limit up to power-up having been exceeded or due to an OFF command during the measurement, and has reset the function selection in P115.","measure":"Re-start with P115 function selection = 2 'Motor identification at standstill'. The ON command must be given within 20 sec. after the alarm message A078 = standstill measurement has appeared.\n\nCancel the OFF command and re-start measurement."},"F115":{"code":"F115","name":"KF internal","cause":"A fault has occurred during calculations in the context of the MotID.","measure":"Power-down the converter and electronics and power-up again."},"F116":{"code":"F116","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F117":{"code":"F117","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F118":{"code":"F118","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F119":{"code":"F119","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F120":{"code":"F120","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F121":{"code":"F121","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F122":{"code":"F122","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F123":{"code":"F123","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F124":{"code":"F124","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F125":{"code":"F125","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F126":{"code":"F126","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F127":{"code":"F127","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F128":{"code":"F128","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F129":{"code":"F129","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F130":{"code":"F130","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F131":{"code":"F131","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F132":{"code":"F132","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F133":{"code":"F133","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F134":{"code":"F134","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F135":{"code":"F135","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F136":{"code":"F136","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F137":{"code":"F137","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F138":{"code":"F138","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F139":{"code":"F139","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F140":{"code":"F140","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F141":{"code":"F141","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F142":{"code":"F142","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F143":{"code":"F143","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F144":{"code":"F144","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F145":{"code":"F145","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F146":{"code":"F146","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F147":{"code":"F147","name":"Technology board fault","cause":"See TB documentation.","measure":"See TB documentation."},"F148":{"code":"F148","name":"Fault 1 Function blocks","cause":"An active signal is present at binector U061 (1).","measure":"Examine cause of fault, see function diagram 710."},"F149":{"code":"F149","name":"Fault 2 Function blocks","cause":"An active signal is present at binector U062 (1).","measure":"Examine cause of fault, see function diagram 710."},"F150":{"code":"F150","name":"Fault 3 Function blocks","cause":"An active signal is present at binector U063 (1).","measure":"Examine cause of fault, see function diagram 710."},"F151":{"code":"F151","name":"Fault 4 Function blocks","cause":"An active signal is present at binector U064 (1).","measure":"Examine cause of fault, see function diagram 710."},"F153":{"code":"F153","name":"No valid sign-of-life tool interface","cause":"Within the monitoring time of the tool interface no valid sign-of-life has been received from the tool interface.","measure":"Cyclically execute write tasks from the tool interface within the monitoring time whereby the sign-of-life has to be increased by 1 for every write task."},"F243":{"code":"F243","name":"Link int.","cause":"Fault in internal linking. One of the two linked partners does not reply.","measure":"Replace CU (-A10), or replace the unit (Compact PLUS)."},"F244":{"code":"F244","name":"ParaLink int.","cause":"Fault in the internal parameter linking.","measure":"Release comparison of gating unit software and operating software regarding the transfer parameters.\n\nReplace CU (-A10), or replace the unit (Compact PLUS type)."},"F255":{"code":"F255","name":"Fault in EEPROM","cause":"A fault has occurred in the EEPROM.","measure":"Switch off the unit and switch it on again. If the fault re-occurs, replace CU (-A10), or replace the unit (Compact PLUS)."},"A001":{"code":"A001","name":"Calculating time","cause":"The calculating time utilization is too high.\n\na) At least 3 failures of time slots T6 or T7 (see also parameter r829.6 or r829.6)\n\nb) At least 3 failures of time slots T2, T3, T4 or T5 (see also parameter r829.2 to r829.5)","measure":"- Observe r829 CalcTimeHdroom\n- Increase P357 Sampling Time or\n- Reduce P340 Pulse Frequency"},"A002":{"code":"A002","name":"SIMOLINK start alarm","cause":"Start of the SIMOLINK ring is not functioning.","measure":"- Check the fiber-optic cable ring for interruptions\n- Check whether there is an SLB without voltage in the ring\n- Check whether there is a faulty SLB in the ring"},"A014":{"code":"A014","name":"Simulation active alarm","cause":"The DC link voltage is not equal to 0 when the simulation mode is selected (P372 = 1).","measure":"- Set P372 to 0.\n- Reduce DC link voltage (disconnect the converter from the supply)"},"A015":{"code":"A015","name":"External alarm 1","cause":"Parameterizable external alarm input 1 has been activated.","measure":"Check:\n- whether the cable to the corresponding digital input has been interrupted\n- parameter P588 Src No Ext Warn1"},"A016":{"code":"A016","name":"External alarm 2","cause":"Parameterizable external alarm input 2 has been activated.","measure":"Check:\n- whether the cable to the corresponding digital input has been interrupted\n- parameter P589 Src No Ext Warn2"},"A017":{"code":"A017","name":"Safe Stop alarm active","cause":"The switch for blocking the inverter pulses (X9 terminal 5-6) has been opened (only for units with Order No. ...-11, ...-21, ...-31, ...61).","measure":"Close switch X9 5-6 and thus release the inverter pulses."},"A020":{"code":"A020","name":"Overcurrent","cause":"An overcurrent condition has occurred.","measure":"Check the driven load for an overload condition.\n- Are the motor and the converter matched?\n- Have the dynamic performance requirements been exceeded?"},"A021":{"code":"A021","name":"Overvoltage","cause":"An overvoltage condition has occurred.","measure":"Check the supply voltage. The converter regenerates without regeneration possibility."},"A022":{"code":"A022","name":"Inverter temperature","cause":"The threshold for initiating an alarm has been exceeded.","measure":"- Measure intake air or ambient temperature.\n- Observe the derating curves at theta >45°C (Compact PLUS) or 40°C.\n\nCheck:\n- Whether the fan -E1 is connected and is rotating in the correct direction.\n- The air intake and discharge openings for blockage.\n- The temperature sensor at -X30.\n- r833 indicates the maximum converter temperature of all existing measuring points (Compact/chassis type unit).\n- r833.01 indicates the actual converter temperature (Compact PLUS type)."},"A023":{"code":"A023","name":"Motor temperature","cause":"The parameterizable threshold for initiating an alarm has been exceeded.","measure":"Check the motor (load, ventilation, etc.). The current temperature can be read in r009 Motor Tmp.\nCheck the KTY84 input at connector -X103:29,30, or -X104:29,30 (Compact PLUS type) for short-circuit."},"A024":{"code":"A024","name":"Motor movement","cause":"The motor has moved during motor data identification.","measure":"Lock the motor."},"A025":{"code":"A025","name":"I2t Inverter","cause":"If the instantaneous load condition is maintained, then the inverter will be thermally overloaded.","measure":"Check:\n- P72 Rtd Drive Amps\n- MLFB P70\n- P128 Imax\n- r010 Drive Utilizat"},"A026":{"code":"A026","name":"Ud too high","cause":"Ud is above the continuously permissible DC link voltage for more than 30 sec in a time interval of 90sec.","measure":""},"A029":{"code":"A029","name":"I2t motor","cause":"The parameterized limit value for the I2t monitoring of the motor has been exceeded.","measure":"Motor load cycle is exceeded!\n\nCheck the parameters:\nP382 Motor Cooling\nP383 Mot Tmp T1\nP384 Mot Load Limits"},"A033":{"code":"A033","name":"Overspeed","cause":"Bit 3 in r553 status word 2 of the setpoint channel. The speed actual value has exceeded the value of maximum speed plus the set hysteresis.","measure":"P804 Overspeed Hys plus\nP452 n/f(max, FWD Spd) or\nP453 n/f(max, REV Spd) has been exceeded\n\nIncrease the parameter for the maximum frequencies or reduce the regenerative load."},"A034":{"code":"A034","name":"Setpoint/actual value deviation","cause":"Bit 8 in r552 status word 1 of the setpoint channel. The difference between frequency setpoint/actual value is greater than the parameterized value and the control monitoring time has elapsed.","measure":"Check:\n- whether an excessive torque requirement is present\n- whether the motor has been dimensioned too small\n\nIncrease values P792 Perm Deviation Frq / set/actual DevSpeed and P794 Deviation Time."},"A035":{"code":"A035","name":"Wire break","cause":"The clockwise and/or the counter-clockwise rotating field is not enabled, or a wire breakage is present in the terminal wiring (both control word bits are zero).","measure":"Check whether cable(s) to the corresponding digital input(s) P572 Src FWD Spd / P571 Src REV Spd is (are) interrupted or released."},"A036":{"code":"A036","name":"Brake checkback 'Brake still closed'","cause":"The brake checkback indicates the 'Brake still closed' state.","measure":"Check brake checkback (see FD 470)."},"A037":{"code":"A037","name":"Brake checkback 'Brake still open'","cause":"The brake checkback indicates the 'Brake still open' state.","measure":"Check brake checkback (see FD 470)."},"A041":{"code":"A041","name":"Vdmax controller inhibit","cause":"The line voltage is too high or the drive line voltage (P071) is incorrectly parameterized.\nThe Vdmax controller is disabled despite parameter access (P515), as otherwise the motor would accelerate immediately in operation to the maximum frequency.","measure":"Check:\n- the line voltage\n- P071 Line Volts"},"A042":{"code":"A042","name":"Motor stall/lock","cause":"Motor is stalled or blocked.\n\nThe alarm cannot be influenced by P805 'PullOut/BlckTime', but by P794 'Deviation Time'.","measure":"Check:\n- whether the drive is locked\n- whether the encoder cable is interrupted during speed control and whether the shield is connected\n- Whether the drive has stalled\n- For synchronous motors (P095=12): excitation current injection"},"A043":{"code":"A043","name":"n-act jump","cause":"The permissible change value of the speed encoder signal (P215) has been exceeded.\n\nAdditionally for synchronous motors (P095=12): The motor rotates with more than 2% of the rated speed at the time of inverter release. The inverter status 'Ready for operation' is not exited.","measure":"Check the tachometer cables for interruptions.\nCheck the earthing of the tachometer shield.\n\n- The shield must be connected both on the motor and on the converter side.\n- The encoder cable must not be interrupted.\n- The encoder cable must not be laid with the power cables.\n- Only the recommended encoders should be used.\n- If there is a signal fault, use the DTI board if necessary. If required, change P215.\n- Additionally for synchronous motors (P095=12): Do not grant inverter release until the motor is at standstill."},"A044":{"code":"A044","name":"I too low","cause":"Only for synchronous motors (P095=12) in operation:\nThe difference smoothed with P159 between excitation current setpoint and actual value (r160 - r156) deviates from zero by more than 25 % of the rated magnetizing current.","measure":"Only for synchronous motors P095=12:\nCheck:\n- whether the current limitation of the excitation current control is too small\n- whether the dynamic performance of the excitation current injection is too low\n- whether the excitation current injection function is operating\n- whether the wiring of excitation current actual-value P155 is correct\n- whether the wiring of excitation current setpoint r160 is correct\n- whether there is a wire break between MASTERDRIVES and the excitation device\n- whether the voltage limitation is too low for dynamic excitation current control\n- whether the analog output for r160 takes place without isolating amplifiers (despite cable length > 4 m)"},"A045":{"code":"A045","name":"DC braking activated","cause":"The DC braking function has been activated and the motor frequency is still above the frequency at which DC braking begins (P398).","measure":"- Increase frequency at which DC braking begins."},"A049":{"code":"A049","name":"No slave","cause":"At serial I/O (SCB1 with SCI1/2), no slave is connected or fiber-optic cable is interrupted or slaves are without voltage.","measure":"P690 SSCI AnaIn Conf\n- Check slave.\n- Check cable."},"A050":{"code":"A050","name":"Slave incorrect","cause":"At ser. I/O the slaves required according to a parameterized configuration are not present (slave number or slave type). Analog inputs or outputs or digital inputs or outputs have been parameterized which are not physically present.","measure":"Check parameter P693 (analog outputs), P698 (digital outputs). Check connectors K4101...K4103, K4201...K4203 (analog inputs) and binectors B4100...B4115, B4120...B4135, B4200...B4215, B4220...B4235 (digital inputs) for connecting."},"A051":{"code":"A051","name":"Peer baud rate","cause":"In a peer-to-peer connection a baud rate has been selected which is too high or too different.","measure":"Adjust the baud rate in conjunction with the SCB boards P701 SCom/SCB Baud Rate."},"A052":{"code":"A052","name":"Peer PcD L","cause":"In a peer-to-peer connection, a PcD length has been set which is too high (>5).","measure":"Reduce number of words P703 SCom/SCB PcD #."},"A053":{"code":"A053","name":"Peer Lng f.","cause":"In a peer-to-peer connection, the pcD length of transmitter and receiver do not match.","measure":"Adjust the word length for transmitter and receiver P703 SCom/SCB PcD #."},"A057":{"code":"A057","name":"TB Param","cause":"Occurs when a TB is logged on and present, but parameter tasks from the PMU, SCom1 or SCom2 have not been answered by the TB within 6 seconds.","measure":"Replace TB configuration (software)."},"A061":{"code":"A061","name":"Alarm 1 Function blocks","cause":"An active signal is present at binector U065 (1).","measure":"Check cause of alarm (see FD 710)."},"A062":{"code":"A062","name":"Alarm 2 Function blocks","cause":"An active signal is present at binector U066 (1).","measure":"Check cause of alarm (see FD 710)."},"A063":{"code":"A063","name":"Alarm 3 Function blocks","cause":"An active signal is present at binector U067 (1).","measure":"Check cause of alarm (see FD 710)."},"A064":{"code":"A064","name":"Alarm 4 Function blocks","cause":"An active signal is present at binector U068 (1).","measure":"Check cause of alarm (see FD 710)."},"A065":{"code":"A065","name":"Auto restart active","cause":"The auto restart option (P373) restarts the drive. A possibly parameterized power-up delay time (P374) expires if flying restart is not selected. During pre-charging of the DC link, there is no time monitoring i.e. with an external electronics power supply, it is also switched-on again.","measure":"Caution!\n\nPersonnel could be in danger when the drive automatically restarts. Check whether the auto restart function is really required!"},"A066":{"code":"A066","name":"fsyn > fmax","cause":"The measured target frequency of the external converter (or supply) is greater than the parameterized maximum frequency of the synchronizing converter.","measure":"Check:\n- P452 n/f(max, FWD Spd) / P453 n/f(max,REV Spd) are correct and\n- correct motor data set P578 Src MotDSet Bit0 are selected."},"A067":{"code":"A067","name":"fsyn < fmin","cause":"The measured target frequency of the external converter (or supply) is less than the minimum frequency required for synchronizing.","measure":"Check:\n- r533 Sync Target Freq\n- Synchronizing cable."},"A068":{"code":"A068","name":"fsyn<>fsoll","cause":"The setpoint frequency of the synchronizing converter deviates too significantly from the measured target frequency of the external converter (or supply). The permissible deviation can be set in P529.","measure":"Adjust total setpoint (main and additional setpoints) to the target frequency displayed in visualization parameter r533."},"A069":{"code":"A069","name":"RGen active","cause":"Synchronizing is not started as long as the ramp-function generator in the synchronizing converter setpoint channel is active. This alarm is only output if synchronizing is selected.","measure":"Wait until acceleration has been completed.\n\nCheck whether\n- P462 Accel Time\n- P463 Accel Time Unit have been correctly set."},"A070":{"code":"A070","name":"Sync error","cause":"This alarm is output if the phase difference goes outside the synchronizing window (P531) after successful synchronization.","measure":"The alarm can only be deleted after synchronization has been exited."},"A071":{"code":"A071","name":"tSY missing","cause":"An attempt has been made to start synchronization with either the synchronizing board not inserted or not parameterized.","measure":"Insert the TSY board in the subrack."},"A075":{"code":"A075","name":"Ls, Rr Dev.","cause":"The measured values of the leakage measurement or of rotor resistance deviate significantly.","measure":"Usually the leakage reactance P122 is the average value resulting from the measured values in r546.1...12, and the rotor resistance r126 from the values in r542.1..3.\n\nIf individual measured values significantly deviate from the average values, they are automatically not taken into account for the calculation (for RI) or the value of the automatic parameterization remains (for Ls). It is only necessary to check the results for their plausibility in the case of drives with high requirements on torque or speed accuracy."},"A076":{"code":"A076","name":"t-comp lim","cause":"The determined compensation time was limited to the value range of 0.5 μs - 1.5 μs.","measure":"Converter output and motor output are too different.\nCheck motor data input P095 to P109."},"A077":{"code":"A077","name":"r-g limit","cause":"The measured resistance has been limited to the maximum value of 49 %.","measure":"Converter output and motor output are too different.\nCheck motor data input P095 to P109."},"A078":{"code":"A078","name":"Stands. Meas","cause":"The standstill measurement is executed when the converter is powered up. The motor can align itself several times in a certain direction with this measurement.","measure":"If the standstill measurement can be executed without any danger:\n- Power up the converter."},"A079":{"code":"A079","name":"Mld Inv Stop","cause":"The rotating measurement has been aborted or cannot commence because an inverter stop command is present.","measure":"P561 Src InvRelese - Release the inverter.\n\nIf necessary, re-start the measurement by powering-up the converter."},"A080":{"code":"A080","name":"MotId:Dr.M","cause":"When the converter is powered up, the rotating measurement automatically accelerates the drive. The drive can then only be externally controlled in a restricted fashion.","measure":"If the rotating measurement can be executed without any danger:\n- Power up the converter."},"A081":{"code":"A081","name":"CB alarm","cause":"The following description refers to the 1st CBP. For other CBs or the TB see operating instructions for CB board.\n\nThe ID byte combinations which are being sent from the DP master in the configuration telegram are not in conformance with the permissible ID byte combinations. (See also Compendium, Chapter 8, Table 8.2-12).\nConsequence:\nNo connection is made with the PROFIBUS master.","measure":"New configuration necessary."},"A082":{"code":"A082","name":"CB alarm","cause":"The following description refers to the 1st CBP. For other CBs or the TB see the operating instructions for the CB board.\n\nNo valid PPO type can be identified from the configuration telegram of the DP master.\nConsequence:\nNo connection is made with the PROFIBUS master.","measure":"New configuration necessary."},"A083":{"code":"A083","name":"CB alarm","cause":"The following description refers to the 1st CBP. For other CBs or the TB see the operating instructions for the CB board.\n\nNo net data or invalid net data (e.g. complete control word STW1=0) are being received from the DP mast /* =====================================================================

   ===================================================================== */
const NUM_WORDS = {
  zero:0, oh:0, o:0, one:1, two:2, to:2, too:2, three:3, tree:3, four:4, for:4,
  five:5, six:6, seven:7, eight:8, ate:8, nine:9, ten:10, eleven:11, twelve:12,
  thirteen:13, fourteen:14, fifteen:15, sixteen:16, seventeen:17, eighteen:18,
  nineteen:19, twenty:20, thirty:30, forty:40, fifty:50, sixty:60, seventy:70,
  eighty:80, ninety:90, hundred:100
};
function wordsToDigits(s) {
  const tokens = s.toLowerCase().split(/[\s\-]+/);
  let out = '', pending = null;
  const flush = () => { if (pending !== null) { out += pending; pending = null; } };
  for (const t of tokens) {
    if (t in NUM_WORDS) {
      const n = NUM_WORDS[t];
      if (n === 100 && pending !== null) pending *= 100;
      else if (n >= 20 && n < 100) { flush(); pending = n; }
      else if (n < 10) {
        if (pending !== null && pending >= 20 && pending < 100) pending += n;
        else if (pending !== null) { out += pending; pending = n; }
        else out += n;
      } else { flush(); out += n; }
    } else if (/^\d+$/.test(t)) { flush(); out += t; }
    else { flush(); out += ' ' + t + ' '; }
  }
  flush();
  return out;
}
function normalizeCode(letter, num) {
  letter = letter.toUpperCase();
  const n = parseInt(num, 10);
  if (letter === 'FF') return 'FF' + String(n).padStart(2, '0');
  return letter + String(n).padStart(3, '0');
}
function extractCode(raw) {
  if (!raw) return null;
  let s = raw.toLowerCase().trim();
  s = s.replace(/\beff\b/g,'f').replace(/\bef\b/g,'f').replace(/\bay\b/g,'a');
  let m = s.match(/\b(ff|f|a)\s*(\d{1,3})\b/);
  if (m) return normalizeCode(m[1], m[2]);
  const wd = wordsToDigits(s);
  m = wd.match(/\b(ff|f|a)\s*(\d{1,3})\b/);
  if (m) return normalizeCode(m[1], m[2]);
  m = wd.match(/\b(?:fault|error|code)\s+(\d{1,3})\b/);
  if (m) return normalizeCode('f', m[1]);
  return null;
}

  if (!raw) return null;
  const s = raw.toLowerCase();
  for (const p of CMD_PATTERNS) if (p.re.test(s)) return p.cmd;
  return null;
}
