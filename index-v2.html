let currentCode = null;
let currentSteps = [];
let stepIdx = 0;

function collapseWs(s) {
  return (s || '').replace(/\s+/g, ' ').trim();
}

/**
 * Split a block into logical items. Tries, in order:
 *   1. Numbered markers ("1.", "2)", ...) at line start — requires >=2.
 *   2. Bullet markers ("-", "•", "*") at line start — requires >=2.
 *   3. Blank-line-separated paragraphs — requires >=2.
 *   4. Sentence split on ". " before a capital letter.
 * Mid-item newlines (word-wrap from the source PDF) are collapsed to spaces.
 */
function splitItems(text) {
  if (!text) return [];
  const t = text.replace(/\r/g, '');

  // Detect markers at line start: "1.", "2)", "-", "•", "*"
  const markerRe = /(?:^|\n)[ \t]*(?:\d+[\.\)]|[-•*])[ \t]+/g;
  const markers = [...t.matchAll(markerRe)];

  if (markers.length >= 2) {
    const items = [];
    // a. Text before the first marker → handle as sentences, but drop
    //    trailing header-only lines ("Check:", "Observe:", "Possibly:" etc.)
    //    since they introduce the bullets rather than being a step themselves.
    const before = t.slice(0, markers[0].index).trim();
    if (before) {
      const lines = before.split('\n').map(s => s.trim()).filter(Boolean);
      const last = lines[lines.length - 1] || '';
      if (/:$/.test(last) && last.length <= 35) lines.pop();
      const remainder = lines.join(' ').trim();
      if (remainder) items.push(...sentenceSplit(remainder));
    }
    // b. One item per marker, up to the next marker (or end). Strip
    //    trailing header-only lines ("Check:", etc.) that introduce the
    //    following group but got captured inside this item.
    for (let i = 0; i < markers.length; i++) {
      const start = markers[i].index + markers[i][0].length;
      const end   = i + 1 < markers.length ? markers[i + 1].index : t.length;
      const lines = t.slice(start, end).split('\n').map(s => s.trim()).filter(Boolean);
      while (lines.length > 1) {
        const last = lines[lines.length - 1];
        if (/:$/.test(last) && last.length <= 35) lines.pop();
        else break;
      }
      const content = collapseWs(lines.join(' '));
      if (content) items.push(content);
    }
    return items;
  }

  // No markers → blank-line paragraphs
  const paras = t.split(/\n[ \t]*\n/).map(collapseWs).filter(Boolean);
  if (paras.length >= 2) return paras;

  // Last resort → sentence split
  return sentenceSplit(collapseWs(t));
}

function sentenceSplit(s) {
  const out = collapseWs(s).split(/(?<=[.!?])\s+(?=[A-Z])/).filter(Boolean);
  return out.length ? out : (s ? [collapseWs(s)] : []);
}

const splitBullets      = splitItems;
const splitMeasureSteps = splitItems;

/* Inline SVG generic diagrams, picked by code category */
function diagramFor(code) {
  const n = parseInt(code.replace(/\D/g,''), 10) || 0;
  const letter = code[0];
  if (letter === 'A') return {svg: SVG_AMBIENT, cap:'Generic warning — check ambient / preventive items'};
  if (letter === 'F' && code.startsWith('FF')) return {svg: SVG_POWER, cap:'Fatal fault — check DC-link & power stage'};
  if (n >= 1 && n <= 10)   return {svg: SVG_POWER,   cap:'Power section: mains, contactor, DC-link'};
  if (n >= 11 && n <= 19)  return {svg: SVG_THERMAL, cap:'Thermal: heatsink, fan, airflow'};
  if (n >= 20 && n <= 29)  return {svg: SVG_THERMAL, cap:'Thermal: motor temperature sensor'};
  if (n >= 30 && n <= 49)  return {svg: SVG_MOTOR,   cap:'Motor / output: cable, ground, overcurrent'};
  if (n >= 50 && n <= 79)  return {svg: SVG_ENCODER, cap:'Encoder / feedback / speed loop'};
  if (n >= 80 && n <= 129) return {svg: SVG_COMMS,   cap:'Communications / option board / bus'};
  return {svg: SVG_GENERIC, cap:'General check — follow counter-measures'};
}

function buildSteps(fault) {
  const bullets = splitBullets(fault.cause);
  const measureSteps = splitMeasureSteps(fault.measure);
  const steps = [];
  steps.push({ kind:'title', code:fault.code, name:fault.name });
  // Skip cause step entirely if the source has no content for it
  if (bullets.length > 0) {
    steps.push({ kind:'cause', bullets });
  }
  measureSteps.forEach((txt, i) => {
    steps.push({ kind:'measure', idx:i+1, total:measureSteps.length, text:txt });
  });
  const d = diagramFor(fault.code);
  steps.push({ kind:'diagram', svg:d.svg, caption:d.cap });
  steps.push({ kind:'summary', code:fault.code, name:fault.name, related:relatedCodes(fault.code) });
  return steps;
}

function relatedCodes(code) {
  const prefix = code.slice(0,2);
  const base = parseInt(code.replace(/\D/g,''),10);
  const all = Object.keys(FAULTS);
  const near = all.filter(k =>
    k !== code &&
    k[0] === code[0] &&
    Math.abs((parseInt(k.replace(/\D/g,''),10) || 0) - base) <= 2
  ).slice(0, 4);
  return near;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}

function renderStep() {
  const step = currentSteps[stepIdx];
  if (!step) return;
  let html = '';
  if (step.kind === 'title') {
    html = `
      <div>
        <div class="section-label">Fault code</div>
        <div class="code-badge">${escapeHtml(step.code)}</div>
        <div class="code-name">${escapeHtml(step.name)}</div>
      </div>`;
  } else if (step.kind === 'cause') {
    html = `
      <div>
        <div class="section-label">Cause</div>
        <ul class="bullets">
          ${step.bullets.map(b => `<li>${escapeHtml(b)}</li>`).join('') || '<li>(no details)</li>'}
        </ul>
      </div>`;
  } else if (step.kind === 'measure') {
    html = `
      <div>
        <div class="section-label">Counter-measure — step ${step.idx} of ${step.total}</div>
        <div class="big-num">${step.idx}</div>
        <div class="step-text">${escapeHtml(step.text)}</div>
      </div>`;
  } else if (step.kind === 'diagram') {
    html = `
      <div>
        <div class="section-label">Reference diagram</div>
        <div class="diagram-wrap">${step.svg}</div>
        <div class="diagram-caption">${escapeHtml(step.caption)}</div>
      </div>`;
  } else if (step.kind === 'summary') {
    html = `
      <div>
        <div class="summary-done">✓ Done</div>
        <div class="code-name">${escapeHtml(step.code)} — ${escapeHtml(step.name)}</div>
        ${step.related.length ? `
          <div class="section-label" style="margin-top:18px;">Related codes</div>
          <div class="related">${step.related.map(r => `<span onclick="showFault('${r}')">${r}</span>`).join('')}</div>
        `:''}
        <div class="related" style="margin-top:18px;">
          <span onclick="restartSteps()">↺ Restart</span>
          <span onclick="closeStage()">🏠 Home</span>
        </div>
      </div>`;
  }
  stepBody.innerHTML = html;

  // Persistent fault header — show on all steps except title (which already
  // displays the code as its main content).
  if (step.kind === 'title' || !currentCode) {
    faultHeader.classList.remove('show');
    faultHeader.innerHTML = '';
  } else {
    const f = FAULTS[currentCode];
    const name = f ? f.name : '';
    faultHeader.innerHTML =
      `<span class="fh-code">${escapeHtml(currentCode)}</span>` +
      `<span class="fh-name">${escapeHtml(name)}</span>`;
    faultHeader.classList.add('show');
  }

  stepCounter.textContent = `${stepIdx+1} / ${currentSteps.length}`;
  progressEl.innerHTML = currentSteps.map((_,i)=>
    `<div class="dot ${i===stepIdx?'active':(i<stepIdx?'done':'')}"></div>`
  ).join('');
  prevBtn.disabled = stepIdx === 0;
  prevBtn.textContent = '◀ Back';
  nextBtn.textContent = stepIdx === currentSteps.length - 1 ? 'Finish' : 'Next ▶';
  starBtn.classList.toggle('on', isFav(currentCode));
  // Auto-read when hands-free active
  if (handsFree) speakCurrentStep();
}

function showFault(code) {
  code = code.toUpperCase();
  const f = FAULTS[code];
  errorSlot.innerHTML = '';
  // Clear stale status from previous search
  heard.textContent = '';
  statusEl.textContent = '';
  if (!f) {
    const near = Object.keys(FAULTS).filter(k => k.startsWith(code.slice(0,2))).slice(0,12);
    errorSlot.innerHTML = `
      <div class="error-card">
        <h2>${escapeHtml(code)} — not found</h2>
        <div class="suggest">
          ${near.map(k => `<span onclick="showFault('${k}')">${k}</span>`).join('')}
        </div>
      </div>`;
    return;
  }
  currentCode = code;
  currentSteps = buildSteps(f);
  stepIdx = 0;
  stageEl.classList.remove('hidden');
  renderStep();
  incCount(code);
  stageEl.scrollIntoView({behavior:'smooth', block:'start'});
}
function closeStage() {
  stageEl.classList.add('hidden');
  stopSpeak();
  currentCode = null;
  faultHeader.classList.remove('show');
  faultHeader.innerHTML = '';
}
function restartSteps() { stepIdx = 0; renderStep(); }
function nextStep() {
  if (stepIdx < currentSteps.length - 1) { stepIdx++; renderStep(); }
  else { closeStage(); }
}
function prevStep() { if (stepIdx > 0) { stepIdx--; renderStep(); } }

prevBtn.onclick = () => { stopSpeak(); prevStep(); };
nextBtn.onclick = () => { stopSpeak(); nextStep(); };
closeBtn.onclick = closeStage;
starBtn.onclick = () => { toggleFav(currentCode); starBtn.classList.toggle('on', isFav(currentCode)); renderFavs(); };
readBtn.onclick = () => {
  if (speaking) { stopSpeak(); }
  else { speakCurrentStep(); }
};

// keyboard navigation
document.addEventListener('keydown', e => {
  if (stageEl.classList.contains('hidden')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') e.preventDefault();
  if (e.key === 'ArrowRight') nextStep();   // LTR: right arrow goes forward
  if (e.key === 'ArrowLeft')  prevStep();
  if (e.key === 'Escape')     closeStage();
});
// touch swipe
let touchX = null;
stageEl.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive:true});
stageEl.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 60) { dx < 0 ? nextStep() : prevStep(); } // LTR: swipe left = next
  touchX = null;
});

/* =====================================================================
   TTS
   ===================================================================== */
const synth = window.speechSynthesis;
let speaking = false;
function stopSpeak() {
  if (synth && synth.speaking) synth.cancel();
  speaking = false;
  readBtn.classList.remove('reading');
}
function speakText(text) {
  if (!synth || !text) return;
  stopSpeak();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.95; u.pitch = 1;
  u.onend = () => { speaking = false; readBtn.classList.remove('reading'); };
  u.onerror = () => { speaking = false; readBtn.classList.remove('reading'); };
  speaking = true;
  readBtn.classList.add('reading');
  synth.speak(u);
}
function speakCurrentStep() {
  const step = currentSteps[stepIdx];
  if (!step) return;
  let txt = '';
  if (step.kind === 'title')   txt = `Fault ${spellCode(step.code)}. ${step.name}.`;
  else if (step.kind === 'cause') txt = 'Cause. ' + step.bullets.join('. ');
  else if (step.kind === 'measure') txt = `Step ${step.idx} of ${step.total}. ${step.text}`;
  else if (step.kind === 'diagram') txt = step.caption;
  else if (step.kind === 'summary') txt = `Finished. ${spellCode(step.code)}. ${step.name}.`;
  speakText(txt);
}
function spellCode(c) {
  // "F023" -> "F zero two three" for clearer TTS
  return c.split('').map(ch => /\d/.test(ch) ? ({0:'zero',1:'one',2:'two',3:'three',4:'four',5:'five',6:'six',7:'seven',8:'eight',9:'nine'}[ch]) : ch).join(' ');
}

   FAVORITES / USAGE COUNT
   ===================================================================== */
const LS_FAV = 'siemens_v2_favs';
const LS_CNT = 'siemens_v2_counts';
function getFavs()  { try { return JSON.parse(localStorage.getItem(LS_FAV))  || []; } catch { return []; } }
function getCounts(){ try { return JSON.parse(localStorage.getItem(LS_CNT)) || {}; } catch { return {}; } }
function isFav(c)   { return c && getFavs().includes(c); }
function toggleFav(c) {
  if (!c) return;
  const f = getFavs();
  const i = f.indexOf(c);
  if (i >= 0) f.splice(i,1); else f.push(c);
  localStorage.setItem(LS_FAV, JSON.stringify(f));
}
function incCount(c) {
  const cnt = getCounts();
  cnt[c] = (cnt[c] || 0) + 1;
  localStorage.setItem(LS_CNT, JSON.stringify(cnt));
}
const favsPanel = document.getElementById('favsPanel');
const favList   = document.getElementById('favList');
function renderFavs() {
  const favs = getFavs();
  const cnt = getCounts();
  if (!favs.length) {
    favList.innerHTML = '<div class="empty">No favorites yet. Tap ⭐ on any fault.</div>';
  } else {
    favs.sort((a,b) => (cnt[b]||0) - (cnt[a]||0));
    favList.innerHTML = favs.map(c => `
      <div class="fav-chip" onclick="showFault('${c}')">
        <strong>${c}</strong>
        <span class="rm">×${cnt[c]||1}</span>
        <span class="rm" onclick="event.stopPropagation(); removeFav('${c}');">✕</span>
      </div>`).join('');
  }
}
function removeFav(c) {
  const f = getFavs().filter(x => x !== c);
  localStorage.setItem(LS_FAV, JSON.stringify(f));
  renderFavs();
  if (currentCode === c) starBtn.classList.remove('on');
}
document.getElementById('favBtn').onclick = () => {
  const shown = favsPanel.style.display !== 'none';
  favsPanel.style.display = shown ? 'none' : 'block';
  if (!shown) renderFavs();
};

/* =====================================================================
   THEME + GLOVE
   ===================================================================== */
const LS_THEME = 'siemens_v2_theme';
const LS_GLOVE = 'siemens_v2_glove';
const THEMES = ['', 'theme-night', 'theme-hc'];
const THEME_ICONS = { '':'🌓', 'theme-night':'🌙', 'theme-hc':'☀️' };
function applyTheme(t) {
  document.body.classList.remove('theme-night','theme-hc');
  if (t) document.body.classList.add(t);
  document.getElementById('themeBtn').textContent = THEME_ICONS[t] || '🌓';
  localStorage.setItem(LS_THEME, t);
}
function cycleTheme() {
  const cur = localStorage.getItem(LS_THEME) || '';
  const i = THEMES.indexOf(cur);
  applyTheme(THEMES[(i+1) % THEMES.length]);
}
document.getElementById('themeBtn').onclick = cycleTheme;
applyTheme(localStorage.getItem(LS_THEME) || '');

function applyGlove(on) {
  document.body.classList.toggle('glove', on);
  document.getElementById('gloveBtn').classList.toggle('active', on);
  localStorage.setItem(LS_GLOVE, on ? '1':'');
}
document.getElementById('gloveBtn').onclick = () => {
  applyGlove(!document.body.classList.contains('glove'));
};
applyGlove(localStorage.getItem(LS_GLOVE) === '1');

/* =====================================================================
   MANUAL INPUT
   ===================================================================== */
document.getElementById('manualBtn').onclick = () => {
  const v = document.getElementById('manualInput').value.trim().toUpperCase();
  if (v) showFault(v);
};
document.getElementById('manualInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('manualBtn').click();
});

/* =====================================================================
   SPEECH RECOGNITION (one-shot + hands-free)
   ===================================================================== */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn   = document.getElementById('micBtn');
const heard    = document.getElementById('heard');
const statusEl = document.getElementById('status');
const hfBtn    = document.getElementById('handsFreeBtn');

let rec = null, listening = false, handsFree = false;

function handleTranscript(text) {
  heard.textContent = 'Heard: ' + text;
  // Commands only meaningful when stage is open
  if (!stageEl.classList.contains('hidden')) {
    const cmd = extractCommand(text);
    if (cmd) { runCommand(cmd); return; }
  }
  const code = extractCode(text);
  if (code) { statusEl.textContent = 'Recognized: ' + code; showFault(code); }
  else if (!stageEl.classList.contains('hidden')) {
    // in stage, don't nag
  } else {
    statusEl.innerHTML = '<span class="err-msg">Not recognized. Try again or type manually.</span>';
  }
}
function runCommand(cmd) {
  statusEl.textContent = 'Command: ' + cmd;
  switch (cmd) {
    case 'next':  stopSpeak(); nextStep(); break;
    case 'back':  stopSpeak(); prevStep(); break;
    case 'read':  speakCurrentStep(); break;
    case 'stop':  stopSpeak(); break;
    case 'again': stopSpeak(); restartSteps(); break;
    case 'star':  toggleFav(currentCode); renderStep(); break;
    case 'close': closeStage(); break;
    case 'favs':  document.getElementById('favBtn').click(); break;
  }
}

function buildRec(continuous) {
  const r = new SR();
  r.lang = 'en-US';
  r.interimResults = true;
  r.continuous = continuous;
  r.onstart = () => { listening = true; micBtn.classList.add('listening');
    micBtn.innerHTML = '🔴<br>Listening'; heard.textContent = ''; };
  r.onend = () => {
    listening = false;
    micBtn.classList.remove('listening');
    micBtn.innerHTML = '🎤<br>Press &amp; speak';
    if (handsFree) {
      // auto-restart in hands-free mode
      try { r.start(); } catch(e) {}
    }
  };
  r.onerror = (e) => {
    statusEl.innerHTML = '<span class="err-msg">Speech error: '+e.error+'</span>';
    if (handsFree && e.error !== 'not-allowed') {
      setTimeout(() => { try { r.start(); } catch(ex) {} }, 600);
    }
  };
  r.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const tr = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += tr; else interim += tr;
    }
    heard.textContent = 'Heard: ' + (final || interim);
    if (final) handleTranscript(final);
  };
  return r;
}

if (!SR) {
  micBtn.disabled = true;
  hfBtn.disabled = true;
  statusEl.innerHTML = '<span class="err-msg">This browser does not support speech recognition. Use Chrome.</span>';
} else {
  rec = buildRec(false);
  micBtn.onclick = () => {
    if (listening) { rec.stop(); return; }
    try { statusEl.textContent = ''; rec.start(); }
    catch(e) { statusEl.innerHTML = '<span class="err-msg">'+e.message+'</span>'; }
  };
  hfBtn.onclick = () => {
    handsFree = !handsFree;
    hfBtn.classList.toggle('on', handsFree);
    hfBtn.textContent = handsFree ? '🛑 Stop hands-free' : '🙌 Hands-free';
    try { rec.stop(); } catch(e) {}
    rec = buildRec(handsFree);
    if (handsFree) {
      try { rec.start(); } catch(e) {}
      statusEl.textContent = 'Hands-free ON — say a code, or: next / back / read / stop / again / star / close';
    } else {
      statusEl.textContent = 'Hands-free OFF';
    }
  };
}
